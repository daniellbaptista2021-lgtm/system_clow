server {
    listen 80;
    server_name system-clow.pvcorretor01.com.br;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name system-clow.pvcorretor01.com.br;

    ssl_certificate /etc/letsencrypt/live/system-clow.pvcorretor01.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/system-clow.pvcorretor01.com.br/privkey.pem;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/event-stream;

    # ═══ IFRAME EMBEDDING: allow Clow main to embed System Clow ═══
    # Remove X-Frame-Options globally and use CSP frame-ancestors instead
    add_header Content-Security-Policy "frame-ancestors 'self' https://clow.pvcorretor01.com.br" always;

    # HTML — never cache
    location = / {
        proxy_pass http://127.0.0.1:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Content-Security-Policy "frame-ancestors 'self' https://clow.pvcorretor01.com.br" always;
    }

    location = /sw.js {
        proxy_pass http://127.0.0.1:3001;
        proxy_set_header Host $host;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Service-Worker-Allowed "/";
    }

    # Static assets — long cache + allow cross-origin for logos
    location /assets/ {
        proxy_pass http://127.0.0.1:3001;
        add_header Cache-Control "public, max-age=604800, immutable";
        add_header Access-Control-Allow-Origin "https://clow.pvcorretor01.com.br";
    }

    # API v1 — SSE streaming, long timeout
    location /v1/ {
        client_max_body_size 50M;
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        proxy_buffering off;
        chunked_transfer_encoding on;
    }

    # Auth routes
    location /auth/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Default — everything else

    # Downloads - arquivos gerados
    # File downloads (proxied to Node backend at /opt/system-clow/output)
    location /downloads/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        # Allow large files
        client_max_body_size 100M;
        proxy_buffering off;
    }

    # Onda 60: páginas estáticas servidas direto pelo nginx
    location = /privacy.html { alias /opt/system-clow/public/privacy.html; default_type text/html; add_header Cache-Control "public, max-age=600"; }
    location = /terms.html { alias /opt/system-clow/public/terms.html; default_type text/html; add_header Cache-Control "public, max-age=600"; }
    location = /pricing.html { alias /opt/system-clow/public/pricing.html; default_type text/html; add_header Cache-Control "public, max-age=600"; }
    location = /signup.html { alias /opt/system-clow/public/signup.html; default_type text/html; add_header Cache-Control "public, max-age=600"; }
    # Onda 60: screenshots pra Play Store
    location /assets/screenshots/ { alias /opt/system-clow/public/assets/screenshots/; add_header Cache-Control "public, max-age=86400"; }

    # Onda 60: Digital Asset Links pra TWA (Play Store)
    location = /.well-known/assetlinks.json {
        alias /opt/system-clow/public/.well-known/assetlinks.json;
        default_type application/json;
        add_header Access-Control-Allow-Origin '*';
        add_header Cache-Control 'public, max-age=3600';
    }

    # DF Festas clone
location /df-festas/ {
        alias /var/www/html/df-festas/;
        try_files $uri $uri/ /df-festas/index.html;
        index index.html;
    }

    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_buffering off;
    }
}
