<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>CRM Clow</title>
<link rel="icon" href="/assets/favicon-gold.png">
<link rel="stylesheet" href="/crm/crm.css">
</head>
<body>

<!-- ─── AUTO-AUTH SCREEN (sempre carrega — JS popula com loader/erro) ─── -->
<div id="loginScreen" class="login-shell">
  <div class="login-card" style="text-align:center">
    <div style="width:40px;height:40px;margin:0 auto 16px;border:3px solid rgba(155,89,252,.25);border-top-color:#9B59FC;border-radius:50%;animation:bootspin .9s linear infinite"></div>
    <div style="color:#9898B8;font-size:13px">Conectando seu CRM...</div>
    <style>@keyframes bootspin{to{transform:rotate(360deg)}}</style>
  </div>
</div>

<!-- ─── APP SHELL ─── -->
<div id="app" class="app-shell hide">
  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="brand">
      <svg class="brand-infinite" viewBox="0 0 240 120" fill="none" xmlns="http://www.w3.org/2000/svg" aria-label="System Clow">
        <defs>
          <linearGradient id="brandGrad" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="#ffffff"/>
            <stop offset="100%" stop-color="#E8E8F0"/>
          </linearGradient>
        </defs>
        <path d="M 50,60 C 50,30 95,30 120,60 C 145,90 190,90 190,60 C 190,30 145,30 120,60 C 95,90 50,90 50,60 Z"
              stroke="url(#brandGrad)" stroke-width="14" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
    <nav>
      <button class="nav-item" data-view="kanban"><span class="nav-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="9" rx="1.5"/><rect x="14" y="3" width="7" height="5" rx="1.5"/><rect x="14" y="12" width="7" height="9" rx="1.5"/><rect x="3" y="16" width="7" height="5" rx="1.5"/></svg></span><span class="nav-label">Pipeline</span></button>
      <button class="nav-item" data-view="contacts"><span class="nav-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg></span><span class="nav-label">Contatos</span></button>
      <button class="nav-item" data-view="channels"><span class="nav-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg></span><span class="nav-label">Canais WA</span></button>
      <button class="nav-item" data-view="agents"><span class="nav-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg></span><span class="nav-label">Equipe</span></button>
      <button class="nav-item" data-view="inventory"><span class="nav-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg></span><span class="nav-label">Estoque</span></button>
      <button class="nav-item" data-view="stats"><span class="nav-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg></span><span class="nav-label">Stats</span></button>
    </nav>
    <div class="sidebar-foot">
      <div class="tenant-info">
        <div class="name" id="tenantName">—</div>
        <div class="tier" id="tenantTier">—</div>
      </div>
      <button class="logout-btn" id="logoutBtn">Sair</button>
    </div>
  </aside>

  <!-- MAIN -->
  <main class="main">
    <!-- KANBAN VIEW -->
    <div class="view active" data-view="kanban" id="kanbanView">
      <header class="top-bar">
        <div class="top-bar-left">
          <select id="boardSelector"></select>
          <button class="secondary" id="refreshBtn" title="Atualizar">↻</button>
        </div>
        <div>
          <button id="newCardBtn">+ Novo Card</button>
        </div>
      </header>
      <div id="kanban" class="kanban-board"></div>
    </div>

    <!-- CONTACTS VIEW -->
    <div class="view" data-view="contacts" id="contactsView">
      <header class="top-bar">
        <div class="top-bar-left">
          <h2>Contatos</h2>
          <input type="text" id="contactSearchInput" placeholder="Buscar por nome, telefone, email..." style="width:280px">
        </div>
        <div>
          <button id="newContactBtn">+ Novo Contato</button>
        </div>
      </header>
      <div class="list" id="contactsList"></div>
    </div>

    <!-- CHANNELS VIEW -->
    <div class="view" data-view="channels" id="channelsView">
      <header class="top-bar">
        <div class="top-bar-left"><h2>Canais WhatsApp</h2></div>
        <div>
          <button id="newChannelBtn">+ Novo Canal</button>
        </div>
      </header>
      <div class="list" id="channelsList"></div>
    </div>

    <!-- AGENTS VIEW -->
    <div class="view" data-view="agents" id="agentsView">
      <header class="top-bar">
        <div class="top-bar-left"><h2>Equipe</h2></div>
        <div>
          <button id="newAgentBtn">+ Novo Agente</button>
        </div>
      </header>
      <div class="list" id="agentsList"></div>
    </div>

    <!-- INVENTORY VIEW -->
    <div class="view" data-view="inventory" id="inventoryView">
      <header class="top-bar">
        <div class="top-bar-left"><h2>Estoque</h2></div>
        <div>
          <button id="newInventoryBtn">+ Novo Item</button>
        </div>
      </header>
      <div class="list" id="inventoryList"></div>
    </div>

    <!-- STATS VIEW -->
    <div class="view" data-view="stats" id="statsView">
      <header class="top-bar">
        <div class="top-bar-left"><h2>Dashboard</h2></div>
      </header>
      <div id="statsGrid" style="padding:20px;display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:14px;"></div>
    </div>
  </main>

  <!-- SIDE PANEL (card detail + conversation) -->
  <aside id="sidePanel" class="side-panel hide">
    <div class="panel-head">
      <div class="contact-meta">
        <div class="contact-avatar" id="pAvatar">?</div>
        <div style="min-width:0">
          <div class="contact-name" id="pName">—</div>
          <div class="contact-phone" id="pPhone">—</div>
        </div>
      </div>
      <button class="close-panel" id="closePanelBtn">×</button>
    </div>
    <div class="panel-tabs">
      <button class="panel-tab active" data-tab="conversation">Conversa</button>
      <button class="panel-tab" data-tab="info">Info</button>
      <button class="panel-tab" data-tab="edit">Editar</button>
    </div>
    <div class="panel-body">
      <!-- CONVERSATION -->
      <section class="tab-section conversation active" data-tab="conversation">
        <div class="messages" id="messagesList"></div>
        <div class="composer">
          <div class="channel-selector">
            <label>Enviar por:</label>
            <select id="sendChannelSelect"></select>
          </div>
          <div class="composer-row">
            <button class="icon-btn attach" id="attachBtn" title="Anexar arquivo">📎</button>
            <button class="icon-btn rec" id="recordBtn" title="Gravar áudio">🎤</button>
            <textarea id="composerText" placeholder="Digite uma mensagem..." rows="1"></textarea>
            <button class="icon-btn send" id="sendMsgBtn" title="Enviar">➤</button>
          </div>
          <input type="file" id="attachFile" hidden accept="image/*,audio/*,video/*,application/pdf,.doc,.docx,.xls,.xlsx,.csv,.txt">
        </div>
      </section>
      <!-- INFO (read) -->
      <section class="tab-section" data-tab="info" id="infoSection"></section>
      <!-- EDIT -->
      <section class="tab-section" data-tab="edit" id="editSection"></section>
    </div>
  </aside>
</div>

<!-- ─── TOAST CONTAINER ─── -->
<div id="toastRoot"></div>

<!-- ─── SCRIPT ─── -->
<script type="module" src="/crm/crm.js"></script>
<script src="/crm/crm-extras.js"></script>
</body>
</html>
