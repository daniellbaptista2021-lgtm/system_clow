<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>System Clow</title>
<link rel="icon" type="image/png" href="/assets/favicon.png">
<link rel="apple-touch-icon" href="/assets/icon-192.png">
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#f5f0e8">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#faf8f4;--bg2:#f0ece4;--bg3:#e8e2d8;
  --card:#fff;--card-border:#e5dfd5;
  --text:#0a0a0a;--text2:#2a2a2a;--text3:#555;
  --gold:#d4a043;--gold2:#c28b2d;--gold-light:rgba(212,160,67,.1);
  --tool-bg:#fdf9f0;--tool-border:#ece4d0;
  --green:#2d8a56;--red:#c0392b;
  --font:'Inter',system-ui,sans-serif;--mono:'JetBrains Mono',monospace;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden}
body{font-family:var(--font);background:var(--bg) url('/assets/bg-texture.jpg') center/cover fixed;color:var(--text);display:flex;flex-direction:column;-webkit-font-smoothing:antialiased;font-size:15px;line-height:1.6}

/* LOGIN */
.login-ov{position:fixed;inset:0;z-index:9999;background:var(--bg) url('/assets/bg-texture.jpg') center/cover fixed;display:flex;align-items:center;justify-content:center;transition:opacity .3s}
.login-ov.hide{opacity:0;pointer-events:none}
.login-box{width:100%;max-width:380px;padding:0 24px;text-align:center}
.login-logo{width:340px;height:auto;margin-bottom:36px}
.login-t{font-size:16px;font-weight:600;color:var(--text);margin-bottom:4px}
.login-s{font-size:13px;color:var(--text3);margin-bottom:28px}
.login-f{width:100%;padding:13px 16px;margin-bottom:12px;background:var(--card);border:1px solid var(--card-border);border-radius:10px;color:var(--text);font-size:14px;font-family:var(--font);outline:none;transition:border .2s}
.login-f:focus{border-color:var(--gold)}
.login-f::placeholder{color:var(--text3)}
.login-b{width:100%;padding:13px;margin-top:8px;background:var(--gold);border:none;border-radius:10px;color:#fff;font-size:14px;font-weight:600;font-family:var(--font);cursor:pointer;transition:background .15s}
.login-b:hover{background:var(--gold2)}
.login-e{color:var(--red);font-size:13px;margin-top:10px;min-height:20px}

/* HEADER */
.hd{height:70px;flex-shrink:0;display:flex;align-items:center;padding:0 24px;background:var(--card);border-bottom:1px solid var(--card-border);z-index:100}
.hd-logo{height:120px;margin-right:0;object-fit:contain}
.hd-r{margin-left:auto;display:flex;gap:8px}
.hd-btn{background:none;border:1px solid var(--card-border);color:var(--text2);padding:6px 14px;border-radius:8px;font-size:12px;font-weight:500;font-family:var(--font);cursor:pointer;transition:all .15s}
.hd-btn:hover{border-color:var(--gold);color:var(--gold)}
.hd-btn.out{color:var(--red);border-color:rgba(192,57,43,.2)}.hd-btn.out:hover{border-color:var(--red)}

/* CHAT */
#chat{flex:1;overflow-y:auto;overflow-x:hidden}
#chat::-webkit-scrollbar{width:5px}
#chat::-webkit-scrollbar-thumb{background:var(--bg3);border-radius:3px}
.feed{max-width:780px;width:100%;margin:0 auto;padding:28px 24px 180px}

/* WELCOME */
.wel{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:calc(100vh - 56px - 180px);text-align:center}
.wel.hide{display:none}
.wel-logo{width:500px;height:auto;margin-bottom:36px}
.wel-tag{font-size:11px;letter-spacing:4px;text-transform:uppercase;color:var(--text3);margin-bottom:14px;font-weight:500}
.wel-h{font-size:26px;font-weight:400;color:var(--text2)}
.wel-h b{color:var(--gold);font-weight:600}

/* USER MSG — right aligned */
.u-row{display:flex;justify-content:flex-end;margin:20px 0 8px}
.u-block{max-width:75%;padding:14px 18px;background:var(--gold);border-radius:16px 16px 4px 16px;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.u-block .ut{color:#fff;font-size:15px;line-height:1.6;white-space:pre-wrap}

/* CLOW REPLY — left aligned */
.rp-row{display:flex;justify-content:flex-start;margin:8px 0 20px}

/* TOOL BLOCK */
.tl-block{margin:6px 0;border:1px solid var(--tool-border);border-radius:10px;overflow:hidden;background:var(--tool-bg);transition:border-color .15s}
.tl-block:hover{border-color:var(--gold-light)}
.tl-h{display:flex;align-items:center;gap:8px;padding:9px 14px;cursor:pointer;user-select:none;font-size:13px}
.tl-h:hover{background:rgba(212,160,67,.04)}
.tl-chv{font-size:10px;color:var(--text3);transition:transform .15s;display:inline-block;width:12px}.tl-chv.op{transform:rotate(90deg)}
.tl-lbl{font-weight:600;color:var(--text)}
.tl-fl{color:var(--text3);font-family:var(--mono);font-size:11px;margin-left:auto;max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tl-bd{max-height:0;overflow:hidden;transition:max-height .2s}.tl-bd.op{max-height:600px;overflow-y:auto}
.tl-bdi{padding:10px 14px;background:var(--bg2);border-top:1px solid var(--tool-border);font-family:var(--mono);font-size:12px;color:var(--text2);white-space:pre-wrap;word-break:break-all;line-height:1.5}

/* REPLY */
.rp{max-width:80%;font-size:15px;line-height:1.7;color:var(--text);background:var(--bg2);padding:14px 18px;border-radius:4px 16px 16px 16px;border:1px solid var(--card-border)}
.rp p{margin-bottom:8px}.rp strong{color:var(--gold2);font-weight:600}.rp em{color:var(--text2)}
.rp pre{background:var(--bg2);border:1px solid var(--card-border);border-radius:8px;padding:14px 16px;overflow-x:auto;margin:8px 0;font-size:13px;line-height:1.5}
.rp code{font-family:var(--mono);font-size:13px}
.rp :not(pre)>code{background:var(--bg3);padding:2px 6px;border-radius:4px;font-size:12px;color:var(--gold2)}
.rp ul,.rp ol{margin:6px 0 6px 20px}.rp li{margin-bottom:4px}
.rp h3,.rp h4{margin:12px 0 4px;font-weight:600;font-size:15px;color:var(--text)}
.rp a{color:var(--gold);text-decoration:underline;text-underline-offset:3px}.rp a:hover{color:var(--gold2)}

/* PROCESSING */
.proc{display:flex;align-items:center;gap:8px;padding:12px 0;color:var(--gold);font-size:13px;font-weight:500}
.proc-dot{width:6px;height:6px;border-radius:50%;background:var(--gold);animation:bk 1s ease-in-out infinite}
@keyframes bk{0%,100%{opacity:1}50%{opacity:.2}}

/* INPUT */
.inp-dock{position:fixed;bottom:0;left:0;right:0;z-index:100;padding:0 24px 36px;background:linear-gradient(transparent,var(--bg) 35%);pointer-events:none}
.inp-sh{max-width:780px;margin:0 auto;display:flex;align-items:flex-end;gap:10px;background:var(--card);border:1px solid var(--card-border);border-radius:16px;padding:8px 8px 8px 18px;pointer-events:all;box-shadow:0 4px 20px rgba(0,0,0,.06)}
.inp-sh:focus-within{border-color:var(--gold);box-shadow:0 4px 20px rgba(212,160,67,.12)}
#msg{flex:1;background:none;border:none;color:var(--text);padding:12px 0;font-size:15px;font-family:var(--font);outline:none;resize:none;min-height:24px;max-height:140px;line-height:1.5}
#msg::placeholder{color:var(--text3)}
.snd{width:42px;height:42px;border-radius:12px;border:none;background:var(--gold);color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s}
.snd:hover{background:var(--gold2)}.snd:active{transform:scale(.95)}.snd:disabled{opacity:.2;cursor:default;transform:none}
.snd svg{width:16px;height:16px}
/* Stop button replaces send while processing */
.snd.stop{background:var(--red);border-radius:10px}
.snd.stop:hover{background:#a33}
.snd.stop svg{width:14px;height:14px}

@media(max-width:640px){.feed{padding:20px 14px 170px}.wel-logo{width:280px}.login-logo{width:240px}.wel-h{font-size:22px}.hd{padding:0 14px;height:54px}.hd-logo{height:36px}.inp-dock{padding:0 14px 24px}.u-block{max-width:85%}.rp{max-width:90%}}
</style>
</head>
<body>

<div class="login-ov" id="loginScreen">
  <div class="login-box">
    <img src="/assets/logo.png" class="login-logo" alt="System Clow">
    <div class="login-t">Acesso Restrito</div>
    <div class="login-s">Área exclusiva do administrador</div>
    <input class="login-f" id="loginUser" type="text" placeholder="Usuário" autocomplete="username" autofocus>
    <input class="login-f" id="loginPass" type="password" placeholder="Senha" autocomplete="current-password">
    <button class="login-b" id="loginBtn" onclick="doLogin()">Entrar</button>
    <div class="login-e" id="loginError"></div>
  </div>
</div>

<div id="app" style="display:none;flex:1;flex-direction:column;height:100%">
<div class="hd">
  <img src="/assets/logo.png" class="hd-logo" alt="System Clow">
  <div class="hd-r"><button class="hd-btn" onclick="reset()">Nova conversa</button><button class="hd-btn out" onclick="logout()">Sair</button></div>
</div>
<div id="chat"><div class="feed" id="feed">
  <div class="wel" id="wel">
    <img src="/assets/logo.png" class="wel-logo" alt="System Clow">
    <div class="wel-tag">inteligência infinita · possibilidades premium</div>
    <div class="wel-h">Como posso <b>ajudar</b>?</div>
  </div>
</div></div>
<div class="inp-dock"><div class="inp-sh">
  <textarea id="msg" placeholder="Escreva sua mensagem..." rows="1"></textarea>
  <button class="snd" id="btn" onclick="handleBtn()">
    <svg id="ico-send" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M22 2L11 13"/><path d="M22 2l-7 20-4-9-9-4z"/></svg>
    <svg id="ico-stop" viewBox="0 0 24 24" fill="currentColor" style="display:none"><rect x="6" y="6" width="12" height="12" rx="2"/></svg>
  </button>
</div></div>
</div>

<script>
const U=location.origin,K='clow_live_BjrOCY2elZ5A2TWGEWMxkiyQgDVAWtZs';
let S=null,authToken=null,isProcessing=false,abortCtrl=null;
const LS=document.getElementById('loginScreen'),AP=document.getElementById('app'),LU=document.getElementById('loginUser'),LP=document.getElementById('loginPass'),LE=document.getElementById('loginError');
const sv=localStorage.getItem('clow_token');if(sv){authToken=sv;showApp()}
LP.addEventListener('keydown',e=>{if(e.key==='Enter')doLogin()});LU.addEventListener('keydown',e=>{if(e.key==='Enter')LP.focus()});
async function doLogin(){const u=LU.value.trim(),p=LP.value.trim();if(!u||!p){LE.textContent='Preencha todos os campos';return}document.getElementById('loginBtn').disabled=true;LE.textContent='';try{const r=await fetch(`${U}/auth/login`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:u,password:p})});const d=await r.json();if(d.ok){authToken=d.token;localStorage.setItem('clow_token',d.token);showApp()}else{LE.textContent=d.error||'Credenciais inválidas'}}catch(e){LE.textContent='Erro de conexão'}document.getElementById('loginBtn').disabled=false}
function showApp(){LS.classList.add('hide');setTimeout(()=>{LS.style.display='none'},300);AP.style.display='flex';init();document.getElementById('msg')?.focus()}
function logout(){localStorage.removeItem('clow_token');location.reload()}

const F=document.getElementById('feed'),I=document.getElementById('msg'),B=document.getElementById('btn'),W=document.getElementById('wel');
I?.addEventListener('input',()=>{I.style.height='auto';I.style.height=Math.min(I.scrollHeight,120)+'px'});
I?.addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();handleBtn()}});

const TL={Read:'Leu um arquivo',FileRead:'Leu um arquivo',Bash:'Executou comando',Edit:'Editou um arquivo',FileEdit:'Editou um arquivo',Write:'Criou um arquivo',FileWrite:'Criou um arquivo',Glob:'Buscou arquivos',Grep:'Pesquisou no código',Agent:'Iniciou sub-agente',WebFetch:'Acessou URL',WebSearch:'Pesquisou na web',TodoWrite:'Atualizou tarefas'};
function tl(n){return n.startsWith('mcp__')?'Usou integração':TL[n]||n}
const esc=s=>s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
function md(t){return t.replace(/```(\w*)\n([\s\S]*?)```/g,'<pre><code>$2</code></pre>').replace(/`([^`]+)`/g,'<code>$1</code>').replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>').replace(/\*(.+?)\*/g,'<em>$1</em>').replace(/^### (.+)$/gm,'<h4>$1</h4>').replace(/^## (.+)$/gm,'<h3>$1</h3>').replace(/^- (.+)$/gm,'• $1').replace(/\[([^\]]+)\]\((https?:\/\/[^\)]+)\)/g,'<a href="$2" target="_blank">$1</a>').replace(/(https?:\/\/[^\s<"'\)]+)/g,(m,u)=>m.includes('href=')?m:`<a href="${u}" target="_blank">${u}</a>`).replace(/\n{2,}/g,'</p><p>').replace(/\n/g,'<br>')}
function scr(){document.getElementById('chat').scrollTop=1e6}

function setBtn(mode){
  const send=document.getElementById('ico-send'),stop=document.getElementById('ico-stop');
  if(mode==='stop'){send.style.display='none';stop.style.display='block';B.classList.add('stop');B.disabled=false}
  else{send.style.display='block';stop.style.display='none';B.classList.remove('stop');B.disabled=false}
}

function handleBtn(){
  if(isProcessing){abortCtrl?.abort();return}
  go();
}

function addU(t){
  // Hide welcome, show logo in header
  if(!W.classList.contains('hide')){
    W.classList.add('hide');
    document.querySelector('.hd-logo').classList.add('big');
  }
  const row=document.createElement('div');row.className='u-row';
  const d=document.createElement('div');d.className='u-block';
  d.innerHTML=`<div class="ut">${esc(t)}</div>`;
  row.appendChild(d);F.appendChild(row);scr();
}
function addT(nm,inp){const s=typeof inp==='object'?JSON.stringify(inp,null,2):String(inp||'');let fl='';if(inp&&typeof inp==='object'){fl=inp.file_path?.split(/[/\\]/).pop()||inp.path?.split(/[/\\]/).pop()||inp.command?.slice(0,55)||inp.pattern||inp.query?.slice(0,35)||''}const d=document.createElement('div');d.className='tl-block';d.innerHTML=`<div class="tl-h" onclick="this.querySelector('.tl-chv').classList.toggle('op');this.nextElementSibling.classList.toggle('op')"><span class="tl-chv">›</span><span class="tl-lbl">${tl(nm)}</span>${fl?`<span class="tl-fl">${esc(fl)}</span>`:''}</div><div class="tl-bd"><div class="tl-bdi">${esc(s)}</div></div>`;F.appendChild(d);scr();return d}
function addP(){const d=document.createElement('div');d.className='proc';d.id='proc';d.innerHTML='<div class="proc-dot"></div>Processando...';F.appendChild(d);scr()}

async function go(){
  const t=I.value.trim();if(!t||!S)return;I.value='';I.style.height='auto';
  isProcessing=true;setBtn('stop');
  addU(t);addP();
  try{
    abortCtrl=new AbortController();
    const tm=setTimeout(()=>abortCtrl.abort(),300000);
    const r=await fetch(`${U}/v1/sessions/${S}/messages`,{method:'POST',headers:{'Content-Type':'application/json','Authorization':`Bearer ${K}`},body:JSON.stringify({message:t}),signal:abortCtrl.signal});
    clearTimeout(tm);document.getElementById('proc')?.remove();
    const reader=r.body.getReader();const decoder=new TextDecoder();
    let buf='',txt='',ev='',replyEl=null;
    while(true){
      const{done,value}=await reader.read();if(done)break;
      buf+=decoder.decode(value,{stream:true});const lines=buf.split('\n');buf=lines.pop()||'';
      for(const ln of lines){
        if(ln.startsWith('event: ')){ev=ln.slice(7).trim();continue}
        if(!ln.startsWith('data: '))continue;
        try{const d=JSON.parse(ln.slice(6));
          if(ev==='tool_use'){addT(d.tool_name||'Tool',d.tool_input)}
          else if(ev==='text_delta'){txt+=d.text||'';if(!replyEl){const row=document.createElement('div');row.className='rp-row';replyEl=document.createElement('div');replyEl.className='rp';row.appendChild(replyEl);F.appendChild(row)}replyEl.innerHTML='<p>'+md(txt)+'</p>';scr()}
          else if(ev==='result'&&d.content){txt=d.content;if(!replyEl){const row=document.createElement('div');row.className='rp-row';replyEl=document.createElement('div');replyEl.className='rp';row.appendChild(replyEl);F.appendChild(row)}replyEl.innerHTML='<p>'+md(txt)+'</p>';scr()}
        }catch{}ev='';
      }
    }
  }catch(e){document.getElementById('proc')?.remove();if(e.name!=='AbortError'){const d=document.createElement('div');d.className='rp';d.innerHTML='<p style="color:var(--red)">Erro de conexão</p>';F.appendChild(d);scr()}}
  isProcessing=false;setBtn('send');abortCtrl=null;I.focus();
}

async function reset(){F.innerHTML='';W.classList.remove('hide');F.appendChild(W);await init()}
async function init(){try{const r=await fetch(`${U}/v1/sessions`,{method:'POST',headers:{'Content-Type':'application/json','Authorization':`Bearer ${K}`},body:'{}'});S=(await r.json()).session_id}catch{}}
if('serviceWorker' in navigator){navigator.serviceWorker.register('/sw.js').catch(()=>{})}
</script>
</body>
</html>
