<head>
<meta charset="UTF-8">

<link rel="icon" type="image/png" href="/assets/favicon.png">
<link rel="shortcut icon" type="image/png" href="/assets/favicon.png">
<link rel="apple-touch-icon" href="/assets/apple-touch-icon.png">

<style>
:root{
  --bg:#0a0a14;--bg-soft:#0f0f1e;--bg-panel:#08081a;--bg-card:#14142a;--line:#252545;--line-soft:#1c1c38;--text:#e8e4f0;--muted:#9a9ab7;--muted-2:#6b6b8a;--accent:#9B59FC;--blue:#4A9EFF;--danger:#c46657;--shadow:0 20px 50px rgba(0,0,0,.4);--sidebar:320px;--topbar:64px;--compose:150px;--font:'Inter',system-ui,sans-serif;--serif:'Source Serif 4',serif;--mono:'JetBrains Mono',monospace;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;min-height:100dvh;overflow:hidden}
body{font-family:var(--font);color:var(--text);background:linear-gradient(rgba(37,37,69,.5) 1px, transparent 1px),linear-gradient(90deg, rgba(37,37,69,.5) 1px, transparent 1px),radial-gradient(circle at top, rgba(255,255,255,.03), transparent 36%),var(--bg);background-size:40px 40px,40px 40px,100% 100%,auto;-webkit-font-smoothing:antialiased}
button,input,textarea{font:inherit}
a{color:inherit}
.app-shell{display:flex;height:100%;min-height:100dvh}
.sidebar{width:var(--sidebar);background:rgba(8,8,26,.96);border-right:1px solid var(--line);display:flex;flex-direction:column;position:relative;z-index:20;transition:transform .22s ease,margin-left .22s ease}
.sidebar-top{height:var(--topbar);display:flex;align-items:center;padding:0 18px;gap:12px;border-bottom:1px solid var(--line-soft)}
.brand-name{font-size:15px;font-weight:600;letter-spacing:.01em}
.chrome-btn{width:34px;height:34px;border-radius:10px;border:1px solid transparent;background:transparent;color:var(--muted);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:background .16s ease,border-color .16s ease,color .16s ease}
.chrome-btn:hover{background:rgba(255,255,255,.04);color:var(--text);border-color:var(--line)}
.sidebar-scroll{flex:1;overflow:auto;padding:18px 16px 18px}
.sidebar-actions{display:flex;align-items:center;gap:12px;margin-bottom:18px}
.sidebar-scroll::-webkit-scrollbar,#chat::-webkit-scrollbar{width:8px}
.sidebar-scroll::-webkit-scrollbar-thumb,#chat::-webkit-scrollbar-thumb{background:#353560;border-radius:999px}
.section-title{font-size:13px;color:var(--muted-2);margin:4px 0 12px}
.recent-list{display:flex;flex-direction:column;gap:10px}
.recent-item{border:1px solid rgba(255,255,255,.05);background:linear-gradient(180deg,rgba(255,255,255,.03),rgba(255,255,255,.015));color:var(--text);border-radius:18px;padding:14px 15px;cursor:pointer;text-align:left;transition:border-color .16s ease,background .16s ease,transform .16s ease,box-shadow .16s ease}
.recent-item:hover{background:linear-gradient(180deg,rgba(255,255,255,.05),rgba(255,255,255,.025));border-color:rgba(155,89,252,.22);transform:translateY(-1px)}
.recent-item.active{background:linear-gradient(180deg,rgba(155,89,252,.12),rgba(255,255,255,.03));border-color:rgba(155,89,252,.3);box-shadow:0 14px 34px rgba(0,0,0,.16)}
.recent-item.empty{cursor:default}
.recent-shell{display:flex;gap:12px;align-items:flex-start;width:100%}
.recent-main{min-width:0;flex:1 1 auto}
.recent-name{font-size:15px;line-height:1.35;color:var(--text);display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.recent-meta{font-size:12px;color:var(--muted);margin-top:8px;display:flex;align-items:center;justify-content:space-between;gap:10px}
.recent-count{color:var(--muted-2)}
.recent-delete{width:32px;height:32px;border-radius:10px;border:1px solid rgba(255,255,255,.08);background:rgba(0,0,0,.12);color:var(--muted);display:flex;align-items:center;justify-content:center;cursor:pointer;flex:0 0 auto;transition:background .16s ease,border-color .16s ease,color .16s ease}
.recent-delete:hover{background:rgba(196,102,87,.12);border-color:rgba(196,102,87,.28);color:#f2b5a4}
.side-primary{width:100%;height:44px;border-radius:14px;border:1px solid var(--line);background:rgba(255,255,255,.04);color:var(--text);font-weight:600;cursor:pointer;transition:background .16s ease,border-color .16s ease;flex:1 1 auto}
.side-primary:hover{background:rgba(255,255,255,.06);border-color:rgba(155,89,252,.2)}
.side-menu-btn{width:44px;height:44px;border-radius:14px;border:1px solid var(--line);background:rgba(255,255,255,.04);color:var(--text);display:flex;align-items:center;justify-content:center;cursor:pointer;flex:0 0 auto;transition:background .16s ease,border-color .16s ease}
.side-menu-btn:hover{background:rgba(255,255,255,.06);border-color:rgba(155,89,252,.2)}
.side-menu-btn svg{width:18px;height:18px}
.sidebar-footer{border-top:1px solid var(--line-soft);padding:14px 16px;display:flex;align-items:center;gap:12px;justify-content:space-between}
.avatar{width:44px;height:44px;border-radius:999px;background:linear-gradient(135deg,#9B59FC,#4A9EFF);color:#ffffff;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:600;flex:0 0 auto}
.account-name{font-size:15px;font-weight:600}
.account-plan{font-size:13px;color:var(--muted)}
.main{flex:1;min-width:0;display:flex;flex-direction:column;position:relative}
.sidebar-peek-toggle{position:fixed;top:calc(env(safe-area-inset-top,0px) + 88px);left:12px;width:40px;height:40px;border-radius:12px;border:1px solid rgba(255,255,255,.08);background:rgba(10,10,26,.94);color:var(--text);display:none;align-items:center;justify-content:center;cursor:pointer;z-index:26;box-shadow:0 14px 34px rgba(0,0,0,.22);transition:background .16s ease,border-color .16s ease,transform .16s ease}
.sidebar-peek-toggle:hover{background:rgba(255,255,255,.06);border-color:rgba(155,89,252,.22)}
.sidebar-peek-toggle:active{transform:translateY(1px)}
.sidebar-peek-toggle svg{width:18px;height:18px}
body.sidebar-collapsed .sidebar{margin-left:calc(-1 * var(--sidebar))}
body.sidebar-collapsed .dock{left:24px}
body.sidebar-collapsed .sidebar-peek-toggle{display:flex}
.topbar{height:calc(var(--topbar) + env(safe-area-inset-top,0px));padding:env(safe-area-inset-top,0px) 18px 0;border-bottom:1px solid var(--line-soft);display:flex;align-items:center;gap:12px;backdrop-filter:blur(16px);background:rgba(10,10,20,.85);z-index:10}
.top-left,.top-right{display:flex;align-items:center;gap:8px;min-width:180px}
.top-right{margin-left:auto;justify-content:flex-end}
.mobile-only{display:none}
.brand-top{display:flex;align-items:center}
.brand-top img{height:96px;width:auto;max-width:min(100%,420px);object-fit:contain;object-position:left center;display:block;image-rendering:auto}
.ghost-btn,.outline-btn{height:36px;padding:0 14px;border-radius:12px;border:1px solid var(--line);background:rgba(255,255,255,.03);color:var(--text);cursor:pointer;transition:background .16s ease,border-color .16s ease}
.ghost-btn:hover,.outline-btn:hover{background:rgba(255,255,255,.05)}
.outline-btn{color:#d0c0f0}
.content{flex:1;min-height:0;position:relative}
#chat{height:100%;overflow:auto;overscroll-behavior:contain}
.feed{width:min(100%,1120px);margin:0 auto;padding:40px 28px 220px}
.welcome{min-height:calc(100dvh - var(--topbar) - 160px);display:flex;align-items:center;justify-content:center;padding-top:0}
.welcome.hide{display:none}
.hero{width:min(100%,760px);display:flex;flex-direction:column;align-items:center;text-align:center}
.hero-badge{display:flex;flex-direction:column;align-items:center;gap:16px;margin-bottom:18px}
.hero-mark{width:52px;height:auto;object-fit:contain;flex:0 0 auto;filter:drop-shadow(0 10px 18px rgba(0,0,0,.24))}
.hero h1{font-family:var(--serif);font-size:clamp(42px,6vw,64px);line-height:.96;letter-spacing:-.04em;font-weight:400;max-width:680px;text-align:center}
.hero-sub{color:var(--muted);font-size:16px;margin:18px auto 0;max-width:600px;line-height:1.6;text-align:center}
.composer-card{background:rgba(18,18,38,.97);border:1px solid rgba(255,255,255,.08);border-radius:24px;box-shadow:var(--shadow);padding:16px 18px 14px}
.composer-input{width:100%;min-height:28px;max-height:140px;background:transparent;border:none;color:var(--text);resize:none;outline:none;font-size:16px;line-height:1.55}
.composer-input::placeholder{color:var(--muted-2)}
.composer-toolbar{display:flex;align-items:center;justify-content:space-between;gap:14px}
.toolbar-group{display:flex;align-items:center;gap:12px}
.model-pill{display:inline-flex;align-items:center;padding:10px 14px;border-radius:999px;border:1px solid var(--line);background:rgba(155,89,252,.1);color:#9B59FC;font-size:14px}
.u-row{display:flex;justify-content:flex-end;margin:26px 0 10px}
.u-block{max-width:min(78%,760px);background:linear-gradient(135deg,#9B59FC,#4A9EFF);color:#ffffff;border-radius:22px 22px 8px 22px;padding:16px 18px;box-shadow:0 14px 34px rgba(0,0,0,.24)}
.ut{white-space:pre-wrap;line-height:1.6;font-size:15px}
.rp-row{display:flex;justify-content:flex-start;margin:10px 0 22px}
.rp{max-width:min(86%,840px);color:var(--text);background:rgba(16,16,32,.96);border:1px solid rgba(255,255,255,.08);border-radius:8px 22px 22px 22px;padding:16px 18px;box-shadow:0 18px 40px rgba(0,0,0,.18);line-height:1.7}
.rp p{margin-bottom:10px}
.rp strong{color:#e0d0ff}
.rp em{color:#b8a8d0}
.rp a{color:#b8a0f0;text-decoration:underline;text-underline-offset:3px}
.rp pre{background:#0c0c1e;border:1px solid #2a2a4a;border-radius:14px;padding:14px 16px;overflow:auto;margin:10px 0}
.rp code{font-family:var(--mono);font-size:13px}
.rp :not(pre)>code{background:#0e0e22;border:1px solid #28284a;border-radius:8px;padding:2px 6px}
.rp ul,.rp ol{margin:8px 0 8px 20px}
.rp h3,.rp h4{margin:10px 0 6px}
.tl-block{margin:6px 0;border:1px solid rgba(255,255,255,.08);border-radius:16px;overflow:hidden;background:rgba(14,14,30,.85)}
.tl-h{display:flex;align-items:center;gap:10px;padding:12px 14px;cursor:pointer;color:var(--text)}
.tl-h:hover{background:rgba(255,255,255,.03)}
.tl-chv{font-size:11px;color:var(--muted);transition:transform .15s;width:12px}
.tl-chv.op{transform:rotate(90deg)}
.tl-lbl{font-weight:600}
.tl-fl{margin-left:auto;color:var(--muted);font-size:12px;font-family:var(--mono);max-width:260px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
.tl-bd{max-height:0;overflow:hidden;transition:max-height .18s}
.tl-bd.op{max-height:700px;overflow:auto}
.tl-bdi{padding:14px;border-top:1px solid rgba(255,255,255,.06);background:#0c0c1e;color:#d2c6b8;font-size:12px;font-family:var(--mono);white-space:pre-wrap;word-break:break-word;line-height:1.55}
.proc{display:flex;align-items:center;gap:10px;padding:14px 2px;font-size:15px;font-weight:600}
.proc-dot{width:9px;height:9px;border-radius:999px;background:#9B59FC;animation:blink 1s ease-in-out infinite}.proc-label{color:#9B59FC;animation:pulse-gold 1.5s ease-in-out infinite}@keyframes pulse-gold{0%,100%{opacity:1;text-shadow:0 0 8px #9B59FC88}50%{opacity:0.5;text-shadow:0 0 2px #9B59FC22}}
@keyframes blink{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.25;transform:scale(.8)}}
.dock{position:fixed;left:calc(var(--sidebar) + 24px);right:24px;bottom:calc(24px + env(safe-area-inset-bottom,0px));z-index:15;pointer-events:none}
.dock-inner{width:min(100%,920px);margin:0 auto;pointer-events:auto}
.dock .composer-card{padding:16px 18px 14px;border-radius:24px}
.dock .composer-input{min-height:30px;max-height:140px;font-size:16px}
.send-btn{width:46px;height:46px;border:none;border-radius:14px;background:linear-gradient(135deg,#9B59FC,#4A9EFF);color:#ffffff;display:flex;align-items:center;justify-content:center;cursor:pointer;padding:0;line-height:0;transition:filter .16s ease,transform .16s ease}
.send-btn:hover{filter:brightness(1.04)}
.send-btn:active{transform:translateY(1px)}
.send-btn:disabled{opacity:.35;cursor:default}
.send-btn.stop{background:var(--danger);color:#fff}
.send-btn svg{width:20px;height:20px;display:block;flex:0 0 auto}
.divider{height:1px;background:linear-gradient(90deg,transparent,rgba(255,255,255,.08),transparent);margin:18px 0 4px}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);opacity:0;pointer-events:none;transition:opacity .2s;z-index:18}
.overlay.show{opacity:1;pointer-events:auto}
.login-ov{position:fixed;inset:0;z-index:30;background:linear-gradient(rgba(37,37,69,.5) 1px, transparent 1px),linear-gradient(90deg, rgba(37,37,69,.5) 1px, transparent 1px),radial-gradient(circle at top, rgba(255,255,255,.03), transparent 36%),rgba(8,8,18,.98);background-size:40px 40px,40px 40px,100% 100%,auto;display:flex;align-items:center;justify-content:center;transition:opacity .25s}
.login-ov.hide{opacity:0;pointer-events:none}
.login-wrap{width:min(100%,560px);padding:24px}
.login-card{background:rgba(12,12,28,.96);border:1px solid rgba(155,89,252,.12);border-radius:32px;padding:34px 30px 28px;box-shadow:var(--shadow)}
.login-brand{display:flex;align-items:center;justify-content:center;margin:0 auto 30px}
.login-brand img{height:116px;width:auto;max-width:100%;object-fit:contain;object-position:center;display:block;image-rendering:auto}
.login-title{font-family:var(--serif);font-size:42px;line-height:.96;letter-spacing:-.04em;font-weight:400;margin-bottom:12px}
.login-sub{color:var(--muted);font-size:15px;line-height:1.55;margin-bottom:24px}
.login-f{width:100%;height:54px;border-radius:16px;border:1px solid var(--line);background:#10102a;color:var(--text);padding:0 16px;margin-bottom:12px;outline:none}
.login-f:focus{border-color:#6B59FC;box-shadow:0 0 0 4px rgba(255,255,255,.03)}
.login-f::placeholder{color:var(--muted-2)}
.login-b{width:100%;height:54px;border:none;border-radius:16px;background:linear-gradient(135deg,#9B59FC,#4A9EFF);color:#ffffff;font-weight:700;cursor:pointer;margin-top:6px;transition:filter .16s ease,transform .16s ease;box-shadow:inset 0 1px 0 rgba(155,89,252,.25),0 10px 24px rgba(0,0,0,.3)}
.login-b:hover{filter:brightness(1.02)}
.login-e{min-height:22px;color:#f2b5a4;font-size:13px;margin-top:10px}
.recent-item:focus-visible,.side-primary:focus-visible,.side-menu-btn:focus-visible,.sidebar-peek-toggle:focus-visible,.ghost-btn:focus-visible,.outline-btn:focus-visible,.chrome-btn:focus-visible,.send-btn:focus-visible,.login-b:focus-visible,.login-f:focus-visible{outline:none;box-shadow:0 0 0 3px rgba(155,89,252,.14)}
@media (max-width:1180px){:root{--sidebar:286px}.hero h1{max-width:560px}}
@media (max-width:900px){.mobile-only{display:flex}.desktop-only{display:none}body.sidebar-collapsed .sidebar{margin-left:0}.sidebar{position:fixed;inset:0 auto 0 0;margin-left:0;padding-top:env(safe-area-inset-top,0px);padding-bottom:env(safe-area-inset-bottom,0px);transform:translateX(-100%);transition:transform .22s ease;width:min(86vw,320px)}.sidebar.open{transform:translateX(0)}.sidebar-peek-toggle{display:flex!important;top:calc(env(safe-area-inset-top,0px) + 12px);left:12px}.dock{left:14px;right:14px;bottom:calc(14px + env(safe-area-inset-bottom,0px))}.feed{padding:24px 16px 210px}.welcome{min-height:calc(100dvh - 240px)}.topbar{padding-left:58px;padding-right:12px;gap:8px}.top-left,.top-right{min-width:auto}.brand-top img{height:56px;max-width:180px}.hero h1{font-size:48px;max-width:100%}.hero-mark{width:46px}.outline-btn{height:34px;padding:0 12px}}
@media (max-width:640px){.hero h1{font-size:40px}.hero-mark{width:40px}.u-block{max-width:88%}.rp{max-width:94%}.login-wrap{padding:16px}.login-card{padding:28px 20px 24px;border-radius:24px}.login-title{font-size:34px}.top-right .ghost-btn{display:none}.top-right{gap:6px}.brand-top img{height:44px;max-width:132px}.login-brand img{height:96px}.login-sub{font-size:14px}.outline-btn{height:32px;padding:0 10px;font-size:14px}}
</style>
</head>
<body>
<div class="login-ov" id="loginScreen"><div class="login-wrap"><div class="login-card"><div class="login-brand"><img src="/assets/logo-official-full.png" alt="System Clow"></div><div class="login-title">Entre para continuar.</div><div class="login-sub">Acesso administrativo ao ambiente do System Clow com chat, skills, agentes e tarefas em tempo real.</div><input class="login-f" id="loginUser" type="text" placeholder="Usuário" autocomplete="username" autofocus><input class="login-f" id="loginPass" type="password" placeholder="Senha" autocomplete="current-password"><button class="login-b" id="loginBtn" onclick="doLogin()">Entrar no workspace</button><div class="login-e" id="loginError"></div></div></div></div>
<div class="overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>
<button class="sidebar-peek-toggle" onclick="openSidebar()" aria-label="Abrir menu lateral"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 7h16"/><path d="M4 12h16"/><path d="M4 17h16"/></svg></button>
<div id="app" style="display:none;height:100%"><div class="app-shell">
<aside class="sidebar" id="sidebar">
  <div class="sidebar-top"><button class="chrome-btn mobile-only" onclick="closeSidebar()" aria-label="Fechar menu"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18"/><path d="M6 6l12 12"/></svg></button><div class="brand-name">Conversas</div></div>
  <div class="sidebar-scroll">
    <div class="sidebar-actions"><button class="side-primary" onclick="reset()">Nova conversa</button><button class="side-menu-btn desktop-only" onclick="toggleSidebar()" aria-label="Abrir ou fechar menu lateral"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 7h16"/><path d="M4 12h16"/><path d="M4 17h16"/></svg></button></div>
    <div class="section-title" style="margin-top:18px">Guardadas por 3 dias</div>
    <div class="recent-list" id="recentList"></div>
  </div>
  <div class="sidebar-footer"><div style="display:flex;align-items:center;gap:12px"><div class="avatar">C</div><div><div class="account-name">Clow Admin</div><div class="account-plan">Plano Max</div></div></div><button class="chrome-btn" onclick="logout()" aria-label="Sair"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><path d="m16 17 5-5-5-5"/><path d="M21 12H9"/></svg></button></div>
</aside>
<main class="main">
  <div class="topbar">
    <div class="top-left"><button class="chrome-btn mobile-only" onclick="openSidebar()" aria-label="Abrir menu"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 7h16"/><path d="M4 12h16"/><path d="M4 17h16"/></svg></button><div class="brand-top"><img src="/assets/logo-official-full.png" alt="System Clow"></div></div>
    <div class="top-right"><button class="outline-btn" onclick="logout()">Sair</button></div>
  </div>
  <div class="content"><div id="chat"><div class="feed" id="feed"><section class="welcome" id="wel"><div class="hero"><div class="hero-badge"><img class="hero-mark" src="/assets/logo-official-icon.png" alt="System Clow" style="height:64px;width:auto;margin-bottom:10px"><div class="welc-tagline">INTELIGENCIA INFINITA &bull; POSSIBILIDADES PREMIUM</div><h1>Como posso <span class="gp">ajudar</span>?</h1></div><div class="hero-sub"></div></div></section></div></div></div>
</main></div>
<div class="dock"><div class="dock-inner"><div class="composer-card"><textarea id="msg" class="composer-input" placeholder="O que voce precisa?" rows="1"></textarea><div class="divider"></div><div class="composer-toolbar"><div class="toolbar-group"><div class="model-pill">System Clow</div></div><div class="toolbar-group"><button class="send-btn" id="btn" onclick="handleBtn()"><svg id="ico-send" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><path d="M22 2L11 13"/><path d="M22 2l-7 20-4-9-9-4z"/></svg><svg id="ico-stop" viewBox="0 0 24 24" fill="currentColor" style="display:none"><rect x="6" y="6" width="12" height="12" rx="2"/></svg></button></div></div></div></div></div>
</div>
<script>
const U=location.origin;
const SESSION_TTL=3*24*60*60*1000;
const SESSIONS_KEY='clow_web_sessions_v2';
const ACTIVE_SESSION_KEY='clow_web_active_session_v2';
const TOKEN_KEY='clow_token';
let authToken=localStorage.getItem(TOKEN_KEY),isProcessing=false,abortCtrl=null,currentSessionId=null;
window.addEventListener('error',e=>console.error(e.message));
const LS=document.getElementById('loginScreen'),AP=document.getElementById('app'),LU=document.getElementById('loginUser'),LP=document.getElementById('loginPass'),LE=document.getElementById('loginError');

function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function md(t){
  var s=String(t||"");
  // Escape code blocks first (protect from other replacements)
  var codeBlocks=[];
  s=s.replace(/```(\w*)\n([\s\S]*?)```/g,function(m,lang,code){
    codeBlocks.push('<pre><code>'+code.replace(/</g,'&lt;').replace(/>/g,'&gt;')+'</code></pre>');
    return '\x00CB'+(codeBlocks.length-1)+'\x00';
  });
  // Inline code
  var inlineCode=[];
  s=s.replace(/`([^`]+)`/g,function(m,c){inlineCode.push('<code>'+c.replace(/</g,'&lt;')+'</code>');return '\x00IC'+(inlineCode.length-1)+'\x00';});
  // Headers
  s=s.replace(/^### (.+)$/gm,'<h3>$1</h3>');
  s=s.replace(/^## (.+)$/gm,'<h2>$1</h2>');
  s=s.replace(/^# (.+)$/gm,'<h1>$1</h1>');
  // Bold/italic
  s=s.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>');
  s=s.replace(/\*(.+?)\*/g,'<em>$1</em>');
  // HR
  s=s.replace(/^---+$/gm,'<hr>');
  // Blockquote
  s=s.replace(/^&gt; (.+)$/gm,'<blockquote>$1</blockquote>');
  s=s.replace(/^> (.+)$/gm,'<blockquote>$1</blockquote>');
  // Tables (GFM)
  s=s.replace(/(\|.+\|\s*\n\|[\s\-|:]+\|\s*\n(?:\|.+\|\s*\n?)+)/g,function(tbl){
    var lines=tbl.trim().split('\n');
    if(lines.length<2)return tbl;
    var header=lines[0].split('|').slice(1,-1).map(function(h){return '<th>'+h.trim()+'</th>';}).join('');
    var rows=lines.slice(2).map(function(row){
      var cells=row.split('|').slice(1,-1).map(function(c){return '<td>'+c.trim()+'</td>';}).join('');
      return '<tr>'+cells+'</tr>';
    }).join('');
    return '<table><thead><tr>'+header+'</tr></thead><tbody>'+rows+'</tbody></table>';
  });
  // Lists (- item)
  s=s.replace(/^- (.+)$/gm,'<li>$1</li>');
  s=s.replace(/(<li>.*<\/li>\n?)+/g,function(m){return '<ul>'+m.replace(/\n/g,'')+'</ul>';});
  // Markdown links
  s=s.replace(/\[([^\]]+)\]\((https?:\/\/[^\s)]+)\)/g,'<a href="$2" target="_blank" rel="noopener">$1</a>');
  // Linkify plain URLs
  s=s.replace(/(^|\s)(https?:\/\/[^\s<]+)/g,'$1<a href="$2" target="_blank" rel="noopener">$2</a>');
  // Paragraphs & breaks
  s=s.replace(/\n{2,}/g,'</p><p>');
  s=s.replace(/\n/g,'<br>');
  // Restore code
  s=s.replace(/\x00IC(\d+)\x00/g,function(m,i){return inlineCode[+i];});
  s=s.replace(/\x00CB(\d+)\x00/g,function(m,i){return codeBlocks[+i];});
  return s;
}

function cleanupSessions(){const now=Date.now();const cleaned=readSessions().filter(session=>session&&session.id&&session.createdAt&&(now-session.createdAt)<SESSION_TTL).map(session=>({...session,messages:Array.isArray(session.messages)?session.messages:[]})).sort((a,b)=>(b.updatedAt||b.createdAt)-(a.updatedAt||a.createdAt));writeSessions(cleaned);if(currentSessionId&&!cleaned.some(session=>session.id===currentSessionId)){currentSessionId=null;localStorage.removeItem(ACTIVE_SESSION_KEY)}return cleaned}

function getLatestEmptySession(){return getSessions().find(session=>(session.messages?.length||0)===0)||null}

function relativeTime(ts){const diff=Date.now()-ts;const mins=Math.floor(diff/60000);if(mins<1)return'Agora mesmo';if(mins<60)return`Há ${mins} min`;const hrs=Math.floor(mins/60);if(hrs<24)return`Há ${hrs} h`;return`Há ${Math.floor(hrs/24)} d`}
function saveSessionPatch(id,patcher){const sessions=getSessions();const index=sessions.findIndex(session=>session.id===id);if(index<0)return null;const updated=patcher({...sessions[index],messages:[...sessions[index].messages]});sessions[index]=updated;sessions.sort((a,b)=>(b.updatedAt||b.createdAt)-(a.updatedAt||a.createdAt));writeSessions(sessions);return updated}
function createLocalSession(serverSessionId=''){const now=Date.now();const session={id:uid(),serverSessionId,title:'Nova conversa',createdAt:now,updatedAt:now,messages:[]};const sessions=getSessions();sessions.unshift(session);writeSessions(sessions);currentSessionId=session.id;localStorage.setItem(ACTIVE_SESSION_KEY,currentSessionId);renderRecent();return session}

function updateAssistantMessage(messageId,text){saveSessionPatch(currentSessionId,current=>({...current,updatedAt:Date.now(),messages:current.messages.map(message=>message.id===messageId?{...message,text}:message)}))}

// Tool block — Claude Code style with colored status dot
function renderToolMessage(name,input,options){
  options=options||{};
  const s=typeof input==='object'?JSON.stringify(input,null,2):String(input||'');
  let fl='';
  if(input&&typeof input==='object'){
    fl=(input.file_path&&input.file_path.split(/[\/\\]/).pop())
      ||(input.path&&input.path.split(/[\/\\]/).pop())
      ||(input.command&&input.command.slice(0,70))
      ||input.pattern
      ||(input.query&&input.query.slice(0,50))
      ||'';
  }
  if(fl.length>75)fl=fl.slice(0,75)+'...';

  const d=document.createElement('div');
  d.className='tblk '+(options.status||'act');
  d.dataset.toolName=name;
  d.dataset.startTime=Date.now();

  const outputLines=s.split('\n').slice(0,4).map(function(l){return '<span class="tline">'+esc(l)+'</span>';}).join('');
  const totalLines=s.split('\n').length;
  const more=totalLines>4?'<span class="tout-more">&hellip; +'+(totalLines-4)+' lines (click to expand)</span>':'';

  d.innerHTML=''
    +'<div class="tblk-head" onclick="this.nextElementSibling.classList.toggle(\'op\')">'
    +  '<span class="tdot"></span>'
    +  '<span class="tn">'+esc(name)+'</span>'
    +  (fl?'<span class="ta">('+esc(fl)+')</span>':'')
    +  '<span class="tdr"></span>'
    +'</div>'
    +'<div class="tout">'
    +  '<div class="tout-inner">'+outputLines+more+'</div>'
    +'</div>';

  F.appendChild(d);return d;
}

// Mark a previously-rendered tool block as done or error, with duration
function updateToolStatus(block,status,output){
  if(!block)return;
  block.classList.remove('act','done','err');
  block.classList.add(status);
  const durEl=block.querySelector('.tdr');
  if(durEl&&block.dataset.startTime){
    const ms=Date.now()-parseInt(block.dataset.startTime,10);
    durEl.textContent=ms<1000?ms+'ms':(ms/1000).toFixed(1)+'s';
  }
  if(output!==undefined){
    const inner=block.querySelector('.tout-inner');
    if(inner){
      const txt=typeof output==='object'?JSON.stringify(output,null,2):String(output||'');
      const lines=txt.split('\n').slice(0,4).map(function(l){return '<span class="tline">'+esc(l)+'</span>';}).join('');
      const total=txt.split('\n').length;
      const more=total>4?'<span class="tout-more">&hellip; +'+(total-4)+' lines</span>':'';
      inner.innerHTML=lines+more;
    }
  }
}

// Mission card with progress — polls /v1/missions/:id every 2s
function renderMissionCard(missionId){
  const row=document.createElement('div');row.className='rp-row';
  const d=document.createElement('div');d.className='mcard';d.dataset.missionId=missionId;
  d.innerHTML=''
    +'<div class="mcard-head">'
    +  '<span style="font-size:18px">🚀</span>'
    +  '<div class="mcard-title">Carregando missao...</div>'
    +  '<div class="mcard-pct">0%</div>'
    +'</div>'
    +'<div class="mbar"><div class="mbar-fill" style="width:0%"></div></div>'
    +'<div class="msteps"></div>';
  row.appendChild(d);F.appendChild(row);

  const poll=async()=>{
    try{
      const r=await fetch('/v1/missions/'+missionId,{headers:authHeaders()});
      if(!r.ok)return;
      const m=await r.json();
      d.querySelector('.mcard-title').textContent=m.title;
      d.querySelector('.mcard-pct').textContent=m.progress+'%';
      d.querySelector('.mbar-fill').style.width=m.progress+'%';
      const stepsHtml=(m.stepsDetailed||[]).map(function(s,i){
        const icon=s.status==='running'?'⏳':s.status==='done'?'✅':s.status==='failed'?'❌':'○';
        return '<div class="mstep '+s.status+'"><span class="mstep-icon">'+icon+'</span><span>'+esc(s.title)+'</span></div>';
      }).join('');
      d.querySelector('.msteps').innerHTML=stepsHtml;
      if(m.status==='completed'){d.classList.add('done');return;}
      if(m.status==='failed'){d.classList.add('failed');return;}
      setTimeout(poll,2000);
    }catch(err){console.warn('Mission poll error:',err);setTimeout(poll,5000);}
  };
  poll();
}

// Full conversation replay
function renderConversation(session){
  clearFeed();
  if(!session||!session.messages.length){scr();return;}
  W.classList.add('hide');
  for(const m of session.messages){
    if(m.role==='user')renderUserMessage(m.text);
    else if(m.role==='assistant')renderAssistantMessage(m.text||'');
    else if(m.role==='tool')renderToolMessage(m.toolName||'Tool',m.toolInput,{status:'done'});
    else if(m.role==='error')renderErrorMessage(m.text);
  }
  scr();
}

async function doLogin(){const u=LU.value.trim(),p=LP.value.trim();if(!u||!p){LE.textContent='Preencha todos os campos';return}document.getElementById('loginBtn').disabled=true;LE.textContent='';try{const r=await fetch(`${U}/auth/login`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:u,password:p})});const d=await r.json();if(d.ok){authToken=d.token;localStorage.setItem(TOKEN_KEY,d.token);localStorage.setItem("clow_login_user",u);await showApp()}else LE.textContent=d.error||'Credenciais inválidas'}catch{LE.textContent='Erro de conexão'}document.getElementById('loginBtn').disabled=false}

async function go(){
  const t=(I.value||'').trim();
  if(!t)return;
  if(!authToken){renderErrorMessage('Sessão expirada. Faça login novamente.');logout();return;}

  let session;
  try{session=await ensureCurrentSession(false);}
  catch(e){renderErrorMessage(e?.message||'Não foi possível iniciar a conversa');return;}
  if(!session?.serverSessionId)return;

  I.value='';autoResize(I);
  isProcessing=true;setBtn('stop');closeSidebar();
  W.classList.add('hide');

  // Render user message
  appendMessage(createUserMessage(t));
  renderUserMessage(t);

  // Create assistant message placeholder
  let assistantMessage=createAssistantMessage('');
  appendMessage(assistantMessage);

  // Working indicator appears immediately
  addProcessing();

  // Track active tool blocks by tool_use_id for live status updates
  const activeTools=new Map();
  let lastToolBlock=null;
  let assistantEl=null;
  let txt='';

  try{
    abortCtrl=new AbortController();
    const tm=setTimeout(()=>abortCtrl.abort(),300000);
    let r=await fetch(`${U}/v1/sessions/${session.serverSessionId}/messages`,{
      method:'POST',
      headers:authHeaders(),
      body:JSON.stringify({message:t}),
      signal:abortCtrl.signal
    });
    clearTimeout(tm);

    if(r.status===404){
      setServerSessionId(session.id,null);
      session=await ensureCurrentSession(true);
      if(session&&session.serverSessionId){
        r=await fetch(U+'/v1/sessions/'+session.serverSessionId+'/messages',{
          method:'POST',
          headers:authHeaders(),
          body:JSON.stringify({message:t})
        });
      }
    }

    if(!r.ok){
      document.getElementById('proc')?.remove();
      if(window._procTimer){clearInterval(window._procTimer);window._procTimer=null;}
      let msg=`Erro ${r.status}`;
      try{const d=await r.json();msg=d.message||d.error||msg;}catch{}
      renderErrorMessage(msg);
      return;
    }

    if(!r.body){
      document.getElementById('proc')?.remove();
      renderErrorMessage('Resposta vazia do servidor');
      return;
    }

    // Remove working indicator once stream starts
    const reader=r.body.getReader();
    const decoder=new TextDecoder();
    let buf='',ev='';
    let firstEvent=true;

    while(true){
      const {done,value}=await reader.read();
      if(done)break;
      buf+=decoder.decode(value,{stream:true});
      const lines=buf.split('\n');
      buf=lines.pop()||'';

      for(const ln of lines){
        if(ln.startsWith('event: ')){ev=ln.slice(7).trim();continue;}
        if(!ln.startsWith('data: '))continue;

        // First event arrived — remove Working indicator
        if(firstEvent){
          document.getElementById('proc')?.remove();
          if(window._procTimer){clearInterval(window._procTimer);window._procTimer=null;}
          firstEvent=false;
        }

        try{
          const d=JSON.parse(ln.slice(6));

          if(ev==='tool_use'){
            // Mark previous tool as done (if any still act)
            if(lastToolBlock&&lastToolBlock.classList.contains('act')){
              updateToolStatus(lastToolBlock,'done');
            }
            // Detect special tools for custom rendering
            const toolName=d.tool_name||'Tool';
            const toolInput=d.tool_input;

            // Special handling for TodoWrite — render as task plan
            if(toolName==='TodoWrite'&&toolInput&&Array.isArray(toolInput.todos)){
              const block=renderTodoPlan(toolInput.todos);
              lastToolBlock=null;
            }
            // Special handling for Agent — render as sub-agent
            else if(toolName==='Agent'||toolName==='Task'){
              const block=renderAgentStart(toolInput);
              lastToolBlock=block;
              if(d.tool_use_id)activeTools.set(d.tool_use_id,block);
            }
            // Standard tool
            else{
              const block=renderToolMessage(toolName,toolInput,{status:'act'});
              lastToolBlock=block;
              if(d.tool_use_id)activeTools.set(d.tool_use_id,block);
            }

            // Save to transcript
            const toolMessage=createToolMessage(toolName,toolInput);
            saveSessionPatch(currentSessionId,current=>({
              ...current,
              updatedAt:Date.now(),
              messages:[...current.messages.filter(m=>m.id!==assistantMessage.id),toolMessage,assistantMessage]
            }));
            scr();
          }
          else if(ev==='tool_result'){
            // Mark the matching tool block as done (or error)
            const block=d.tool_use_id?activeTools.get(d.tool_use_id):lastToolBlock;
            if(block){
              updateToolStatus(block,d.is_error?'err':'done');
              activeTools.delete(d.tool_use_id);
            }
          }
          else if(ev==='text_delta'){
            txt+=d.text||'';
            assistantMessage={...assistantMessage,text:txt};
            updateAssistantMessage(assistantMessage.id,txt);
            // Ensure assistant element exists and update it live
            if(!assistantEl||!document.body.contains(assistantEl)){
              assistantEl=renderAssistantMessage(txt);
            }else{
              assistantEl.innerHTML='<p>'+md(txt)+'</p>';
            }
            scr();
          }
          else if(ev==='result'&&d.content){
            txt=d.content;
            assistantMessage={...assistantMessage,text:txt};
            updateAssistantMessage(assistantMessage.id,txt);
            if(!assistantEl||!document.body.contains(assistantEl)){
              assistantEl=renderAssistantMessage(txt);
            }else{
              assistantEl.innerHTML='<p>'+md(txt)+'</p>';
            }

            // Check for mission card marker
            if(d.missionId){
              renderMissionCard(d.missionId);
            }

            // Check if response contains a download link — render as file card
            const dlMatch=txt.match(/\[.*?\]\((https:\/\/[^\s)]*\/downloads\/([^\s)]+))\)/);
            if(dlMatch){
              const url=dlMatch[1];
              const filename=decodeURIComponent(dlMatch[2]);
              renderFileCard(filename,url);
            }

            scr();
          }
          else if(ev==='error'){
            renderErrorMessage(d.message||d.content||'Erro durante o processamento');
            isProcessing=false;setBtn('send');abortCtrl=null;focusComposer();
            return;
          }
          else if(ev==='done'){
            // Mark any remaining active tools as done
            for(const [id,block] of activeTools){
              if(block&&block.classList.contains('act')){
                updateToolStatus(block,'done');
              }
            }
            renderTurnDone();
          }
        }catch(err){console.warn('parse error:',err);}
        ev='';
      }
    }
    renderRecent();
  }catch(e){
    document.getElementById('proc')?.remove();
    if(window._procTimer){clearInterval(window._procTimer);window._procTimer=null;}
    renderErrorMessage(e?.name==='AbortError'?'Tempo limite excedido':(e?.message||'Erro de conexão'));
  }

  isProcessing=false;setBtn('send');abortCtrl=null;focusComposer();
}

// Render TodoWrite as a task plan card (Clow palette)
function renderTodoPlan(todos){
  const row=document.createElement('div');row.className='rp-row';
  const d=document.createElement('div');d.className='tblk done';
  const items=todos.map(function(t,i){
    const icon=t.status==='completed'?'✅':t.status==='in_progress'?'⏳':'○';
    const cls=t.status==='completed'?'done':t.status==='in_progress'?'running':'';
    return '<div class="mstep '+cls+'"><span class="mstep-icon">'+icon+'</span><span>'+esc(t.content||t.activeForm||'')+'</span></div>';
  }).join('');
  d.innerHTML=''
    +'<div class="tblk-head">'
    +  '<span class="tdot"></span>'
    +  '<span class="tn">Plano de Tarefas</span>'
    +  '<span class="ta">('+todos.length+' etapas)</span>'
    +  '<span class="tdr"></span>'
    +'</div>'
    +'<div class="tout op"><div class="tout-inner">'+items+'</div></div>';
  row.appendChild(d);F.appendChild(row);scr();
  return d;
}

// Render Agent/Task tool as sub-agent block
function renderAgentStart(input){
  const row=document.createElement('div');row.className='rp-row';
  const d=document.createElement('div');d.className='tblk act';
  d.dataset.toolName='Agent';
  d.dataset.startTime=Date.now();
  const desc=(input&&(input.description||input.subagent_type))||'Sub-agente';
  const prompt=(input&&input.prompt)||'';
  d.innerHTML=''
    +'<div class="tblk-head" onclick="this.nextElementSibling.classList.toggle(\'op\')">'
    +  '<span class="tdot"></span>'
    +  '<span class="tn">Sub-agent</span>'
    +  '<span class="ta">('+esc(desc)+')</span>'
    +  '<span class="tdr"></span>'
    +'</div>'
    +'<div class="tout"><div class="tout-inner">'+esc(prompt.slice(0,400))+'</div></div>';
  row.appendChild(d);F.appendChild(row);scr();
  return d;
}

window.addEventListener('resize',()=>{if(isMobileLayout()){document.body.classList.add('sidebar-collapsed')}else{sidebar.classList.remove('open');overlay.classList.remove('show')}})
