<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Clow</title>
<link rel="icon" type="image/png" href="/assets/icon-192.png">
<link rel="apple-touch-icon" href="/assets/icon-192.png">
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#1a1a1a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@400;600&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#1a1a1a;--bg2:#232323;--bg3:#2a2a2a;--border:#333;--text:#e3e3e3;--text2:#999;--text3:#666;--accent:#c96;--accent2:#e8a84c;--blue:#6ba3e8;--green:#5bb98b;--red:#e06c75;--font:'Source Sans 3',system-ui,sans-serif;--mono:'Fira Code','Cascadia Code',monospace}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden}
body{font-family:var(--font);background:var(--bg);color:var(--text);display:flex;flex-direction:column;-webkit-font-smoothing:antialiased;font-size:15px;line-height:1.6}

.login-ov{position:fixed;inset:0;z-index:9999;background:var(--bg);display:flex;align-items:center;justify-content:center;transition:opacity .3s}
.login-ov.hide{opacity:0;pointer-events:none}
.login-box{width:100%;max-width:360px;padding:0 24px;text-align:center}
.login-logo{width:100px;height:auto;margin-bottom:28px;border-radius:12px}
.login-t{font-size:18px;font-weight:600;color:var(--text);margin-bottom:6px}
.login-s{font-size:13px;color:var(--text3);margin-bottom:28px}
.login-f{width:100%;padding:12px 16px;margin-bottom:12px;background:var(--bg2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:14px;font-family:var(--font);outline:none}
.login-f:focus{border-color:var(--accent)}.login-f::placeholder{color:var(--text3)}
.login-b{width:100%;padding:12px;margin-top:6px;background:var(--accent);border:none;border-radius:8px;color:#000;font-size:14px;font-weight:600;font-family:var(--font);cursor:pointer}
.login-b:hover{background:var(--accent2)}.login-e{color:var(--red);font-size:13px;margin-top:10px;min-height:20px}

.hd{height:48px;flex-shrink:0;display:flex;align-items:center;padding:0 16px;background:var(--bg2);border-bottom:1px solid var(--border);z-index:100}
.hd-logo{height:24px;border-radius:4px;margin-right:10px}.hd-name{font-size:13px;font-weight:600;color:var(--text2);letter-spacing:1px}
.hd-r{margin-left:auto;display:flex;gap:8px}
.hd-btn{background:none;border:1px solid var(--border);color:var(--text2);padding:5px 12px;border-radius:6px;font-size:12px;font-family:var(--font);cursor:pointer}
.hd-btn:hover{border-color:var(--text2);color:var(--text)}
.hd-btn.out{color:var(--red);border-color:rgba(224,108,117,.3)}.hd-btn.out:hover{border-color:var(--red)}

#chat{flex:1;overflow-y:auto;overflow-x:hidden}
#chat::-webkit-scrollbar{width:6px}#chat::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
.feed{max-width:820px;width:100%;margin:0 auto;padding:24px 20px 160px}

.wel{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:calc(100vh - 48px - 160px);text-align:center}
.wel.hide{display:none}
.wel-logo{width:200px;height:auto;border-radius:16px;margin-bottom:24px}
.wel-tag{font-size:11px;letter-spacing:4px;text-transform:uppercase;color:var(--text3);margin-bottom:12px}
.wel-h{font-size:24px;font-weight:400;color:var(--text2)}.wel-h b{color:var(--accent);font-weight:600}

/* Claude Code style blocks */
.user-block{margin:20px 0 4px;padding:12px 16px;background:var(--bg2);border:1px solid var(--border);border-radius:10px}
.user-block .ut{color:var(--text);font-size:15px;line-height:1.6;white-space:pre-wrap}

.tool-block{margin:4px 0;border:1px solid var(--border);border-radius:8px;overflow:hidden;background:var(--bg)}
.tool-h{display:flex;align-items:center;gap:8px;padding:8px 12px;cursor:pointer;user-select:none;font-size:13px;color:var(--text2)}
.tool-h:hover{background:var(--bg2)}
.tool-chv{font-size:10px;color:var(--text3);transition:transform .15s;display:inline-block}.tool-chv.op{transform:rotate(90deg)}
.tool-lbl{font-weight:600;color:var(--text)}
.tool-fl{color:var(--text3);font-family:var(--mono);font-size:12px;margin-left:auto}
.tool-bd{max-height:0;overflow:hidden;transition:max-height .2s}.tool-bd.op{max-height:600px;overflow-y:auto}
.tool-bdi{padding:10px 12px;background:var(--bg2);border-top:1px solid var(--border);font-family:var(--mono);font-size:12px;color:var(--text2);white-space:pre-wrap;word-break:break-all;line-height:1.5}

.rp{margin:4px 0 16px}.rp p{margin-bottom:8px}.rp strong{color:var(--accent);font-weight:600}.rp em{color:var(--text2)}
.rp pre{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:12px 14px;overflow-x:auto;margin:8px 0;font-size:13px;line-height:1.5}
.rp code{font-family:var(--mono);font-size:13px}.rp :not(pre)>code{background:var(--bg3);padding:1px 5px;border-radius:3px;font-size:12px;color:var(--blue)}
.rp ul,.rp ol{margin:6px 0 6px 20px}.rp li{margin-bottom:4px}.rp h3,.rp h4{margin:10px 0 4px;font-weight:600;font-size:15px;color:var(--text)}
.rp a{color:var(--blue);text-decoration:underline;text-underline-offset:2px}.rp a:hover{color:var(--accent)}

.proc{display:flex;align-items:center;gap:8px;padding:10px 0;color:var(--accent);font-size:13px}
.proc-dot{width:6px;height:6px;border-radius:50%;background:var(--accent);animation:bk 1.2s ease-in-out infinite}
@keyframes bk{0%,100%{opacity:1}50%{opacity:.2}}

.inp-dock{position:fixed;bottom:0;left:0;right:0;z-index:100;padding:0 20px 24px;background:linear-gradient(transparent,var(--bg) 30%);pointer-events:none}
.inp-sh{max-width:820px;margin:0 auto;display:flex;align-items:flex-end;gap:8px;background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:4px 4px 4px 14px;pointer-events:all}
.inp-sh:focus-within{border-color:var(--accent)}
#msg{flex:1;background:none;border:none;color:var(--text);padding:10px 0;font-size:14px;font-family:var(--font);outline:none;resize:none;min-height:20px;max-height:120px;line-height:1.5}
#msg::placeholder{color:var(--text3)}
.snd{width:36px;height:36px;border-radius:8px;border:none;background:var(--accent);color:#000;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.snd:hover{background:var(--accent2)}.snd:active{transform:scale(.95)}.snd:disabled{opacity:.15;cursor:default;transform:none}
.snd svg{width:16px;height:16px}

@media(max-width:640px){.feed{padding:16px 12px 140px}.wel-logo{width:140px}.wel-h{font-size:20px}.hd{padding:0 12px}.inp-dock{padding:0 12px 16px}}
</style>
</head>
<body>

<div class="login-ov" id="loginScreen">
  <div class="login-box">
    <img src="/assets/logo.png" class="login-logo" alt="Clow">
    <div class="login-t">Acesso Restrito</div>
    <div class="login-s">Área exclusiva do administrador</div>
    <input class="login-f" id="loginUser" type="text" placeholder="Usuário" autocomplete="username" autofocus>
    <input class="login-f" id="loginPass" type="password" placeholder="Senha" autocomplete="current-password">
    <button class="login-b" id="loginBtn" onclick="doLogin()">Entrar</button>
    <div class="login-e" id="loginError"></div>
  </div>
</div>

<div id="app" style="display:none;flex:1;flex-direction:column;height:100%">
<div class="hd">
  <img src="/assets/logo.png" class="hd-logo" alt="">
  <span class="hd-name">CLOW</span>
  <div class="hd-r"><button class="hd-btn" onclick="reset()">Nova conversa</button><button class="hd-btn out" onclick="logout()">Sair</button></div>
</div>
<div id="chat"><div class="feed" id="feed">
  <div class="wel" id="wel">
    <img src="/assets/logo.png" class="wel-logo" alt="Clow">
    <div class="wel-tag">inteligência infinita · possibilidades premium</div>
    <div class="wel-h">Como posso <b>ajudar</b>?</div>
  </div>
</div></div>
<div class="inp-dock"><div class="inp-sh">
  <textarea id="msg" placeholder="Responder..." rows="1"></textarea>
  <button class="snd" id="btn" onclick="go()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M22 2L11 13"/><path d="M22 2l-7 20-4-9-9-4z"/></svg></button>
</div></div>
</div>

<script>
const U=location.origin,K='clow_live_BjrOCY2elZ5A2TWGEWMxkiyQgDVAWtZs';
let S=null,authToken=null;
const LS=document.getElementById('loginScreen'),AP=document.getElementById('app'),LU=document.getElementById('loginUser'),LP=document.getElementById('loginPass'),LE=document.getElementById('loginError');
const sv=localStorage.getItem('clow_token');if(sv){authToken=sv;showApp()}
LP.addEventListener('keydown',e=>{if(e.key==='Enter')doLogin()});LU.addEventListener('keydown',e=>{if(e.key==='Enter')LP.focus()});
async function doLogin(){const u=LU.value.trim(),p=LP.value.trim();if(!u||!p){LE.textContent='Preencha todos os campos';return}document.getElementById('loginBtn').disabled=true;LE.textContent='';try{const r=await fetch(`${U}/auth/login`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:u,password:p})});const d=await r.json();if(d.ok){authToken=d.token;localStorage.setItem('clow_token',d.token);showApp()}else{LE.textContent=d.error||'Credenciais inválidas'}}catch(e){LE.textContent='Erro de conexão'}document.getElementById('loginBtn').disabled=false}
function showApp(){LS.classList.add('hide');setTimeout(()=>{LS.style.display='none'},300);AP.style.display='flex';init();document.getElementById('msg')?.focus()}
function logout(){localStorage.removeItem('clow_token');location.reload()}

const F=document.getElementById('feed'),I=document.getElementById('msg'),B=document.getElementById('btn'),W=document.getElementById('wel');
I?.addEventListener('input',()=>{I.style.height='auto';I.style.height=Math.min(I.scrollHeight,120)+'px'});
I?.addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();go()}});

const TL={Read:'Leu um arquivo',FileRead:'Leu um arquivo',Bash:'Executou comando',Edit:'Editou um arquivo',FileEdit:'Editou um arquivo',Write:'Escreveu um arquivo',FileWrite:'Escreveu um arquivo',Glob:'Buscou arquivos',Grep:'Pesquisou no código',Agent:'Iniciou sub-agente',WebFetch:'Acessou URL',WebSearch:'Pesquisou na web',TodoWrite:'Atualizou tarefas'};
function tl(n){return n.startsWith('mcp__')?'Usou integração':TL[n]||`Usou ${n}`}
const esc=s=>s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
function md(t){return t.replace(/```(\w*)\n([\s\S]*?)```/g,'<pre><code>$2</code></pre>').replace(/`([^`]+)`/g,'<code>$1</code>').replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>').replace(/\*(.+?)\*/g,'<em>$1</em>').replace(/^### (.+)$/gm,'<h4>$1</h4>').replace(/^## (.+)$/gm,'<h3>$1</h3>').replace(/^- (.+)$/gm,'• $1').replace(/\[([^\]]+)\]\((https?:\/\/[^\)]+)\)/g,'<a href="$2" target="_blank">$1</a>').replace(/(https?:\/\/[^\s<"'\)]+)/g,(m,u)=>m.includes('href=')?m:`<a href="${u}" target="_blank">${u}</a>`).replace(/\n{2,}/g,'</p><p>').replace(/\n/g,'<br>')}
function scr(){document.getElementById('chat').scrollTop=1e6}
function addU(t){W.classList.add('hide');const d=document.createElement('div');d.className='user-block';d.innerHTML=`<div class="ut">${esc(t)}</div>`;F.appendChild(d);scr()}
function addT(nm,inp){const s=typeof inp==='object'?JSON.stringify(inp,null,2):String(inp||'');let fl='';if(inp&&typeof inp==='object'){fl=inp.file_path?.split(/[/\\]/).pop()||inp.path?.split(/[/\\]/).pop()||inp.command?.slice(0,55)||inp.pattern||inp.query?.slice(0,35)||''}const d=document.createElement('div');d.className='tool-block';d.innerHTML=`<div class="tool-h" onclick="this.querySelector('.tool-chv').classList.toggle('op');this.nextElementSibling.classList.toggle('op')"><span class="tool-chv">›</span><span class="tool-lbl">${tl(nm)}</span>${fl?`<span class="tool-fl">${esc(fl)}</span>`:''}</div><div class="tool-bd"><div class="tool-bdi">${esc(s)}</div></div>`;F.appendChild(d);scr();return d}
function addR(h){const d=document.createElement('div');d.className='rp';d.innerHTML='<p>'+h+'</p>';F.appendChild(d);scr()}
function addP(){const d=document.createElement('div');d.className='proc';d.id='proc';d.innerHTML='<div class="proc-dot"></div>Processing...';F.appendChild(d);scr()}

async function go(){
  const t=I.value.trim();if(!t||!S)return;I.value='';I.style.height='auto';B.disabled=true;
  addU(t);addP();
  try{
    const ac=new AbortController();const tm=setTimeout(()=>ac.abort(),300000);
    const r=await fetch(`${U}/v1/sessions/${S}/messages`,{method:'POST',headers:{'Content-Type':'application/json','Authorization':`Bearer ${K}`},body:JSON.stringify({message:t}),signal:ac.signal});
    clearTimeout(tm);const body=await r.text();document.getElementById('proc')?.remove();
    let txt='',ev='';
    for(const ln of body.split('\n')){
      if(ln.startsWith('event: ')){ev=ln.slice(7).trim();continue}
      if(!ln.startsWith('data: '))continue;
      try{const d=JSON.parse(ln.slice(6));
        if(ev==='tool_use')addT(d.tool_name||'Tool',d.tool_input);
        else if(ev==='text_delta')txt+=d.text||'';
        else if(ev==='result'&&d.content)txt=d.content;
      }catch{}ev='';
    }
    if(txt)addR(md(txt));
  }catch(e){document.getElementById('proc')?.remove();addR(`<span style="color:var(--red)">Erro de conexão</span>`)}
  B.disabled=false;I.focus();
}

async function reset(){F.innerHTML='';W.classList.remove('hide');F.appendChild(W);await init()}
async function init(){try{const r=await fetch(`${U}/v1/sessions`,{method:'POST',headers:{'Content-Type':'application/json','Authorization':`Bearer ${K}`},body:'{}'});S=(await r.json()).session_id}catch{}}
if('serviceWorker' in navigator){navigator.serviceWorker.register('/sw.js').catch(()=>{})}
</script>
</body>
</html>
