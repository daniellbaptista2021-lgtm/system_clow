<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Clow — Inteligência Infinita</title>
  <link rel="icon" type="image/jpeg" href="/assets/logo.jpg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-primary: #08080f;
      --bg-secondary: #0e0e18;
      --bg-tertiary: #151524;
      --bg-tool: #111120;
      --bg-tool-hover: #16162a;
      --border: #1e1e35;
      --border-hover: #2d2d4a;
      --text-primary: #e4e4ee;
      --text-secondary: #8888a4;
      --text-muted: #55556e;
      --accent: #8b5cf6;
      --accent-blue: #6366f1;
      --accent-glow: rgba(139,92,246,0.12);
      --user-bg: linear-gradient(135deg, #7c3aed, #5b21b6);
      --tool-accent: #a78bfa;
      --success: #34d399;
      --error: #fb7185;
      --font: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      --mono: 'JetBrains Mono', 'Fira Code', monospace;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: var(--font); background: var(--bg-primary); color: var(--text-primary);
      height: 100vh; height: 100dvh; display: flex; flex-direction: column; overflow: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* ═══ Header ═══ */
    header {
      background: var(--bg-secondary); border-bottom: 1px solid var(--border);
      padding: 10px 20px; display: flex; align-items: center; gap: 12px; flex-shrink: 0;
    }
    .logo { height: 30px; border-radius: 6px; }
    .logo-text { font-size: 15px; font-weight: 700; letter-spacing: 3px; color: var(--text-primary); }
    .header-right { margin-left: auto; }
    .new-btn {
      background: transparent; border: 1px solid var(--border); color: var(--text-secondary);
      padding: 6px 14px; border-radius: 8px; font-size: 12px; cursor: pointer;
      font-family: var(--font); transition: all 0.2s; letter-spacing: 0.5px;
    }
    .new-btn:hover { border-color: var(--accent); color: var(--accent); }

    /* ═══ Chat ═══ */
    #chat {
      flex: 1; overflow-y: auto; padding: 0; display: flex; flex-direction: column;
      scroll-behavior: smooth;
    }
    #chat::-webkit-scrollbar { width: 3px; }
    #chat::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    .messages-container { max-width: 760px; width: 100%; margin: 0 auto; padding: 24px 20px; display: flex; flex-direction: column; gap: 4px; }

    /* ═══ Welcome ═══ */
    .welcome {
      flex: 1; display: flex; flex-direction: column; align-items: center;
      justify-content: center; gap: 20px; min-height: 400px;
    }
    .welcome.hidden { display: none; }
    .welcome-logo { width: 80px; height: 80px; border-radius: 16px; }
    .welcome-sub { font-size: 11px; letter-spacing: 4px; text-transform: uppercase; color: var(--text-muted); }
    .welcome-title { font-size: 26px; font-weight: 300; color: var(--text-secondary); }
    .welcome-title span { color: var(--accent); font-weight: 500; }

    /* ═══ User Message ═══ */
    .msg-user {
      align-self: flex-end; background: var(--user-bg); padding: 12px 18px;
      border-radius: 18px 18px 4px 18px; max-width: 75%; font-size: 14px;
      line-height: 1.6; color: white; margin: 8px 0;
    }

    /* ═══ Assistant Block ═══ */
    .assistant-block { margin: 12px 0; }

    /* ═══ Tool Use — Claude Code Style ═══ */
    .tool-block {
      background: var(--bg-tool); border: 1px solid var(--border); border-radius: 10px;
      margin: 4px 0; overflow: hidden; transition: border-color 0.2s;
    }
    .tool-block:hover { border-color: var(--border-hover); }
    .tool-header {
      display: flex; align-items: center; gap: 10px; padding: 10px 14px;
      cursor: pointer; user-select: none; transition: background 0.15s;
    }
    .tool-header:hover { background: var(--bg-tool-hover); }
    .tool-chevron { color: var(--text-muted); font-size: 9px; transition: transform 0.2s; width: 12px; }
    .tool-chevron.open { transform: rotate(90deg); }
    .tool-icon-box {
      width: 22px; height: 22px; border-radius: 5px; background: var(--accent-glow);
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; flex-shrink: 0;
    }
    .tool-label { font-family: var(--mono); font-size: 12.5px; font-weight: 500; color: var(--tool-accent); }
    .tool-file { font-size: 12px; color: var(--text-muted); margin-left: auto; font-family: var(--mono); }
    .tool-badge {
      font-size: 10px; padding: 2px 8px; border-radius: 10px; font-weight: 500; letter-spacing: 0.3px;
    }
    .tool-badge.ok { background: rgba(52,211,153,0.1); color: var(--success); }
    .tool-badge.err { background: rgba(251,113,133,0.1); color: var(--error); }
    .tool-badge.run { background: rgba(99,102,241,0.12); color: var(--accent-blue); }
    .tool-body { max-height: 0; overflow: hidden; transition: max-height 0.25s ease; }
    .tool-body.open { max-height: 500px; overflow-y: auto; }
    .tool-body-inner {
      padding: 12px 14px; border-top: 1px solid var(--border);
      font-family: var(--mono); font-size: 12px; color: var(--text-secondary);
      white-space: pre-wrap; word-break: break-all; line-height: 1.5;
    }

    /* ═══ Assistant Text ═══ */
    .msg-assistant {
      font-size: 14.5px; line-height: 1.7; color: var(--text-primary); padding: 8px 0;
    }
    .msg-assistant p { margin-bottom: 10px; }
    .msg-assistant strong { color: #c4b5fd; }
    .msg-assistant pre {
      background: var(--bg-secondary); border: 1px solid var(--border);
      border-radius: 8px; padding: 14px 16px; overflow-x: auto; margin: 10px 0;
      font-size: 13px; line-height: 1.5;
    }
    .msg-assistant code { font-family: var(--mono); font-size: 13px; }
    .msg-assistant :not(pre)>code {
      background: var(--bg-tertiary); padding: 2px 6px; border-radius: 4px;
      font-size: 12.5px; color: #c4b5fd;
    }
    .msg-assistant ul,.msg-assistant ol { margin: 8px 0 8px 20px; }
    .msg-assistant li { margin-bottom: 4px; }
    .msg-assistant h2,.msg-assistant h3,.msg-assistant h4 { margin: 14px 0 6px; color: var(--text-primary); }

    /* ═══ Thinking ═══ */
    .thinking { display: flex; align-items: center; gap: 10px; padding: 14px 0; color: var(--text-muted); font-size: 13px; }
    .dots { display: flex; gap: 4px; }
    .dots span {
      width: 5px; height: 5px; border-radius: 50%; background: var(--accent); opacity: 0.25;
      animation: blink 1.4s ease-in-out infinite;
    }
    .dots span:nth-child(2) { animation-delay: 0.2s; }
    .dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes blink { 0%,80%,100%{opacity:0.25}40%{opacity:1} }

    /* ═══ Input ═══ */
    #input-wrap {
      background: var(--bg-secondary); border-top: 1px solid var(--border);
      padding: 14px 20px; flex-shrink: 0;
    }
    .input-box {
      max-width: 760px; margin: 0 auto; display: flex; align-items: flex-end; gap: 10px;
      background: var(--bg-primary); border: 1px solid var(--border);
      border-radius: 14px; padding: 4px 4px 4px 16px; transition: border-color 0.2s;
    }
    .input-box:focus-within { border-color: var(--accent); box-shadow: 0 0 0 2px var(--accent-glow); }
    #input {
      flex: 1; background: transparent; border: none; color: var(--text-primary);
      padding: 10px 0; font-size: 14px; outline: none; resize: none;
      font-family: var(--font); min-height: 20px; max-height: 120px; line-height: 1.5;
    }
    #input::placeholder { color: var(--text-muted); }
    #send {
      background: var(--accent); color: white; border: none; border-radius: 10px;
      width: 38px; height: 38px; cursor: pointer; display: flex; align-items: center;
      justify-content: center; flex-shrink: 0; transition: all 0.2s;
    }
    #send:hover { background: #7c3aed; }
    #send:disabled { opacity: 0.2; cursor: not-allowed; }
    #send svg { width: 18px; height: 18px; }

    @media(max-width:640px) {
      .messages-container { padding: 16px 12px; }
      .msg-user { max-width: 88%; }
      .welcome-title { font-size: 20px; }
      .welcome-logo { width: 60px; height: 60px; }
    }
  </style>
</head>
<body>
  <header>
    <img src="/assets/logo.jpg" class="logo" alt="Clow">
    <span class="logo-text">CLOW</span>
    <div class="header-right">
      <button class="new-btn" onclick="newChat()">+ Nova conversa</button>
    </div>
  </header>

  <div id="chat">
    <div class="messages-container" id="messages">
      <div class="welcome" id="welcome">
        <img src="/assets/logo.jpg" class="welcome-logo" alt="Clow">
        <div class="welcome-sub">inteligência infinita • possibilidades premium</div>
        <div class="welcome-title">Como posso <span>ajudar</span>?</div>
      </div>
    </div>
  </div>

  <div id="input-wrap">
    <div class="input-box">
      <textarea id="input" placeholder="Mensagem para o Clow..." rows="1"></textarea>
      <button id="send" onclick="send()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/></svg>
      </button>
    </div>
  </div>

  <script>
    const API=location.origin,KEY='clow_live_BjrOCY2elZ5A2TWGEWMxkiyQgDVAWtZs';
    let sid=null;
    const msgs=document.getElementById('messages'),inp=document.getElementById('input'),
          btn=document.getElementById('send'),wel=document.getElementById('welcome');

    inp.addEventListener('input',()=>{inp.style.height='auto';inp.style.height=Math.min(inp.scrollHeight,120)+'px';});
    inp.addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send();}});

    const ICONS={Read:'📄',FileRead:'📄',Bash:'⚡',Edit:'✏️',FileEdit:'✏️',Write:'📝',FileWrite:'📝',
      Glob:'🔍',Grep:'🔎',Agent:'🤖',WebFetch:'🌐',WebSearch:'🔎',TodoWrite:'📋'};
    const icon=n=>n.startsWith('mcp__')?'🔌':(ICONS[n]||'🔧');

    function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

    function md(t){
      return t
        .replace(/```(\w*)\n([\s\S]*?)```/g,'<pre><code>$2</code></pre>')
        .replace(/`([^`]+)`/g,'<code>$1</code>')
        .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
        .replace(/\*(.+?)\*/g,'<em>$1</em>')
        .replace(/^### (.+)$/gm,'<h4>$1</h4>')
        .replace(/^## (.+)$/gm,'<h3>$1</h3>')
        .replace(/^- (.+)$/gm,'• $1')
        .replace(/\n/g,'<br>');
    }

    function addUser(text){
      wel.classList.add('hidden');
      const d=document.createElement('div');d.className='msg-user';d.textContent=text;
      msgs.appendChild(d);scroll();
    }

    function addTool(name,input,status='run'){
      const inp2=typeof input==='object'?JSON.stringify(input,null,2):String(input||'');
      let desc='';
      if(input&&typeof input==='object'){
        const o=input;
        desc=o.command?.slice(0,50)||o.file_path?.split(/[/\\]/).pop()||o.path?.split(/[/\\]/).pop()||o.pattern||o.query?.slice(0,40)||'';
      }
      const d=document.createElement('div');d.className='tool-block';
      d.innerHTML=`<div class="tool-header" onclick="tog(this)">
        <span class="tool-chevron">▶</span>
        <div class="tool-icon-box">${icon(name)}</div>
        <span class="tool-label">${name}</span>
        ${desc?`<span class="tool-file">${esc(desc)}</span>`:''}
        <span class="tool-badge ${status}">${status==='run'?'executando':status==='ok'?'concluído':'erro'}</span>
      </div><div class="tool-body"><div class="tool-body-inner">${esc(inp2)}</div></div>`;
      msgs.appendChild(d);scroll();return d;
    }

    function markTool(block,ok){
      const b=block.querySelector('.tool-badge');
      b.className=`tool-badge ${ok?'ok':'err'}`;
      b.textContent=ok?'concluído':'erro';
    }

    function tog(h){
      h.querySelector('.tool-chevron').classList.toggle('open');
      h.nextElementSibling.classList.toggle('open');
    }

    function addAssistant(html){
      const d=document.createElement('div');d.className='msg-assistant';d.innerHTML=html;
      msgs.appendChild(d);scroll();
    }

    function addThinking(){
      const d=document.createElement('div');d.className='thinking';d.id='think';
      d.innerHTML='<div class="dots"><span></span><span></span><span></span></div>Processando...';
      msgs.appendChild(d);scroll();
    }

    function scroll(){document.getElementById('chat').scrollTop=999999;}

    async function send(){
      const t=inp.value.trim();if(!t||!sid)return;
      inp.value='';inp.style.height='auto';btn.disabled=true;
      addUser(t);addThinking();

      try{
        const r=await fetch(`${API}/v1/sessions/${sid}/messages`,{
          method:'POST',headers:{'Content-Type':'application/json','Authorization':`Bearer ${KEY}`},
          body:JSON.stringify({message:t}),
        });
        const body=await r.text();
        document.getElementById('think')?.remove();

        let text='',ev='';
        const toolBlocks=[];

        for(const line of body.split('\n')){
          if(line.startsWith('event: ')){ev=line.slice(7).trim();continue;}
          if(!line.startsWith('data: '))continue;
          try{
            const d=JSON.parse(line.slice(6));
            if(ev==='tool_use'){
              toolBlocks.push(addTool(d.tool_name||'Tool',d.tool_input));
            }else if(ev==='tool_result'){
              if(toolBlocks.length)markTool(toolBlocks[toolBlocks.length-1],!d.is_error);
            }else if(ev==='text_delta'){
              text+=d.text||'';
            }else if(ev==='result'){
              if(d.content)text=d.content;
            }
          }catch{}
          ev='';
        }

        if(text)addAssistant(md(text));
      }catch(e){
        document.getElementById('think')?.remove();
        addAssistant(`<span style="color:var(--error)">Erro: ${e.message}</span>`);
      }
      btn.disabled=false;inp.focus();
    }

    async function newChat(){
      msgs.innerHTML='';wel.classList.remove('hidden');msgs.appendChild(wel);
      await init();
    }

    async function init(){
      try{
        const r=await fetch(`${API}/v1/sessions`,{
          method:'POST',headers:{'Content-Type':'application/json','Authorization':`Bearer ${KEY}`},
          body:'{}',
        });
        sid=(await r.json()).session_id;
      }catch{}
    }

    init();inp.focus();
  </script>
</body>
</html>
