name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main, master]

# Se um novo push chegar enquanto outro CI roda, cancela o anterior.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ──────────────────────────────────────────────────────────────────
  typecheck:
    name: TypeScript typecheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install deps
        run: npm ci
        env:
          HUSKY: '0'

      - name: tsc --noEmit
        run: npm run typecheck

  # ──────────────────────────────────────────────────────────────────
  test:
    name: Unit tests (vitest)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install deps
        run: npm ci
        env:
          HUSKY: '0'

      - name: Run vitest
        run: npm test

  # ──────────────────────────────────────────────────────────────────
  secrets-scan:
    name: Secrets scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install gitleaks
        run: |
          set -e
          curl -fsSL https://github.com/gitleaks/gitleaks/releases/download/v8.21.2/gitleaks_8.21.2_linux_x64.tar.gz \
            | tar -xz -C /usr/local/bin gitleaks
          chmod +x /usr/local/bin/gitleaks
          gitleaks version

      - name: Scan full history
        run: |
          gitleaks detect \
            --config=.gitleaks.toml \
            --redact \
            --verbose \
            --report-path=gitleaks-report.json \
            --report-format=json

      - name: Upload report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: gitleaks-report
          path: gitleaks-report.json
          retention-days: 30

  # ──────────────────────────────────────────────────────────────────
  build:
    name: Build (tsc → dist/)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install deps
        run: npm ci
        env:
          HUSKY: '0'

      - name: Build TypeScript
        run: npm run build

      - name: Verify dist artifacts
        run: |
          set -e
          test -f dist/server/server.js
          test -f dist/cli.js
          test -d dist/crm
          echo "✓ build artifacts OK"
          ls -la dist/server/server.js dist/cli.js | head
