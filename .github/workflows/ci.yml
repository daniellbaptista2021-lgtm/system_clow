name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main, master]

# Se um novo push chegar enquanto outro CI roda, cancela o anterior.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ──────────────────────────────────────────────────────────────────
  typecheck:
    name: TypeScript typecheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install deps
        run: npm ci
        env:
          HUSKY: '0'

      - name: tsc --noEmit
        run: npm run typecheck

  # ──────────────────────────────────────────────────────────────────
  test:
    name: Unit tests (vitest)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install deps
        run: npm ci
        env:
          HUSKY: '0'

      - name: Run vitest
        run: npm test

  # ──────────────────────────────────────────────────────────────────
  secrets-scan:
    name: Secrets scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install gitleaks
        run: |
          set -e
          curl -fsSL https://github.com/gitleaks/gitleaks/releases/download/v8.21.2/gitleaks_8.21.2_linux_x64.tar.gz \
            | tar -xz -C /usr/local/bin gitleaks
          chmod +x /usr/local/bin/gitleaks
          gitleaks version

      - name: Scan full history
        run: |
          gitleaks detect \
            --config=.gitleaks.toml \
            --redact \
            --verbose \
            --report-path=gitleaks-report.json \
            --report-format=json

      - name: Upload report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: gitleaks-report
          path: gitleaks-report.json
          retention-days: 30

  # ──────────────────────────────────────────────────────────────────
  build:
    name: Build (tsc → dist/)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install deps
        run: npm ci
        env:
          HUSKY: '0'

      - name: Build TypeScript
        run: npm run build

      - name: Verify dist artifacts
        run: |
          set -e
          test -f dist/server/server.js
          test -f dist/cli.js
          test -d dist/crm
          echo "✓ build artifacts OK"
          ls -la dist/server/server.js dist/cli.js | head

      # CATCHES the exact bug class that took prod down on 2026-04-26:
      # bare `require()` inside an ESM module. tsx (used in dev/test)
      # polyfills require so vitest never sees this; plain Node throws
      # ReferenceError at module evaluation. Static grep is faster and
      # has zero false-positives — `import { createRequire }` followed
      # by a renamed local require (e.g. `_require()`) is safe by
      # construction, only top-level `require(` calls ARE the bug.
      - name: Detect bare require() in compiled ESM modules
        run: |
          set -e
          # "require(" at the start of a token (avoid matching .require, _require, etc).
          # Excludes: scripts/*.cjs (CommonJS by design),
          #           node_modules/, lines that contain createRequire (the safe pattern).
          if grep -rn -E '(^|[^a-zA-Z0-9_])require\(' dist/ \
              --include='*.js' \
              --exclude-dir=node_modules \
              | grep -v 'createRequire\|//.*require\|/\*.*require' \
              | grep -v -E '\.cjs:'; then
            echo
            echo "::error::Bare require() found in compiled ESM module. Use createRequire(import.meta.url) instead — see src/server/server.ts or src/tenancy/tenantStore.ts for the pattern. This bug took production down on 2026-04-26."
            exit 1
          fi
          echo "✓ no bare require() in dist/"

      # Smoke import of the server entrypoint — catches OTHER ESM load
      # failures (broken imports, missing peer deps in the lockfile, etc)
      # without actually starting the server. We use --input-type=module
      # so Node treats the eval'd snippet as ESM, matching real boot.
      - name: Smoke-import dist/server/server.js (no boot)
        run: |
          set -e
          # Catch the import error but don't actually run main() — env
          # vars / DB / Anthropic key are not available in CI.
          # Trick: import() returns a Promise that resolves AFTER all
          # top-level code (incl. top-level await) runs. We swap main()
          # to a no-op via a side-channel before import.
          export NODE_ENV=ci-smoketest
          export ANTHROPIC_API_KEY=ci-dummy
          node --input-type=module -e "
            try {
              // This stops at main()'s side effects; if any module-level
              // code throws, this fails.
              await import('./dist/server/server.js').catch(e => {
                // Errors AFTER imports finished (e.g. main() throwing on
                // missing env) are fine — we only care about IMPORT-time
                // failures. Distinguish by message.
                if (/^(Cannot find|require is not defined|SyntaxError)/.test(e.message)) throw e;
                console.log('  (server.js imported OK; main() threw expected env error: ' + e.message.slice(0, 80) + ')');
              });
              console.log('✓ dist/server/server.js imports cleanly');
            } catch (e) {
              console.error('✗ dist/server/server.js FAILED to import:', e.message);
              process.exit(1);
            }
          " &
          PID=$!
          # Server bootstraps would block forever waiting on ports — kill
          # after 10s. If it imported and started spinning up MCP/etc,
          # that's a successful smoke result.
          ( sleep 10 && kill $PID 2>/dev/null ) &
          wait $PID || true
          echo "✓ smoke import done"
